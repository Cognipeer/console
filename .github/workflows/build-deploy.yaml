name: Cgate Build Artifact

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v*'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: cognipeer-cgate

  ACR_LOGIN_SERVER: cognipeer.azurecr.io
  ACR_REPOSITORY: cognipeer-cgate

  HELM_VERSION: v3.15.2
  HELMFILE_VERSION: v0.162.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::339713139704:role/GitHubActionsECRPushRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: "[Azure] Login via Service Principal"
        uses: azure/login@v1
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: "[Azure] Login to ACR"
        run: az acr login --name ${{ env.ACR_LOGIN_SERVER }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set image tag
        id: vars
        run: |
          if [[ "${GITHUB_REF_NAME}" == *"-rc"* ]]; then
            echo "tag=dev" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "tag=dev" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF_NAME}" == "production" ]]; then
            echo "tag=production" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tag=production" >> $GITHUB_OUTPUT
          else
            echo "tag=dev" >> $GITHUB_OUTPUT
          fi

      - name: Build & Push to ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.tag }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_REPOSITORY }}:${{ steps.vars.outputs.tag }}

  notify:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Fire repository_dispatch
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.REPO_PAT_TO_DEPLOY }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{secrets.TENANT_REPO_ADDRESS}}/dispatches \
            -d '{"event_type":"app-released","client_payload":{"image_tag":"${{ github.ref_name }}"}}'