name: Bug report
description: Report a reproducible defect in Cognipeer Console.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Use this form for product or code defects. Do not disclose security vulnerabilities here.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide a minimal, deterministic reproduction.
      placeholder: |
        1. Start the app with ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: main / tag / commit sha
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime mode
      options:
        - SQLite
        - MongoDB
        - Docker
        - Kubernetes
        - Other
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      render: shell