name: Feature request
description: Propose a new capability or improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user or operator pain does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior or API.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Docs
        - API
        - Dashboard UI
        - Providers
        - Tracing
        - Guardrails
        - Vector / RAG
        - Security / Licensing
        - Deployment / Operations
        - Other