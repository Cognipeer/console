replicaCount: 1
image:
  repository: console.azurecr.io
  pullPolicy: Always
  tag: "dev"

environment: "dev"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: "cgate"

podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: "dev"
  hosts:
    - host: app.dev.cgate.ai
      paths:
        - path: /
          pathType: Prefix
  tls:
  - hosts:
    - app.dev.cgate.ai
    secretName: cgate-dev-tls
resources:
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  tcpSocket:
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 5

readinessProbe:
  tcpSocket:
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 5

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

volumes:
- configMap:
    defaultMode: 420
    name: mongo-ca-bundle
  name: mongo-ca-volume

volumeMounts:
- mountPath: /app/global-bundle.pem
  name: mongo-ca-volume
  subPath: global-bundle.pem

nodeSelector: {}
tolerations: []
affinity: {}
secrets:
  jwt_expires_in: ref+vault://cgate-application-credentials-dev?region=eu-central-1#/JWT_EXPIRES_IN 
  jwt_secret: ref+vault://cgate-application-credentials-dev?region=eu-central-1#/JWT_SECRET
  main_db_name: ref+vault://cgate-application-credentials-dev?region=eu-central-1#/MAIN_DB_NAME
  mongodb_uri: ref+vault://cgate-application-credentials-dev?region=eu-central-1#/MONGODB_URI
  smtp_from: ref+vault://cgate-application-credentials-dev?region=eu-central-1#/SMTP_FROM
  smtp_host: ref+vault://cgate-application-credentials-dev?region=eu-central-1#/SMTP_HOST
  smtp_port: ref+vault://cgate-application-credentials-dev?region=eu-central-1#/SMTP_PORT
  smtp_secure: ref+vault://cgate-application-credentials-dev?region=eu-central-1#/SMTP_SECURE
  smtp_user: ref+vault://cgate-application-credentials-dev?region=eu-central-1#/SMTP_USER
  smtp_pass: ref+vault://cgate-application-credentials-dev?region=eu-central-1#/SMTP_PASS
  db_provider: "mongodb"
tls_secrets:
  fullchain_pem: ref+vault://dev_tls_certificate_chain?region=eu-central-1#/fullchain.pem
  privatekey_pem: ref+vault://dev_tls_certificate_chain?region=eu-central-1#/privkey.pem