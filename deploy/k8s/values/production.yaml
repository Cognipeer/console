replicaCount: 3
image:
  repository: 339713139704.dkr.ecr.eu-central-1.amazonaws.com/cognipeer-console
  pullPolicy: Always
  tag: "dev"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: "cognipeer-console"

podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: "production"
  hosts:
    - host: console.cognipeer.com
      paths:
        - path: /
          pathType: Prefix
  tls:
  - hosts:
    - console.cognipeer.com
    secretName: cognipeer-console-production-tls

resources:
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  tcpSocket:
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 5

readinessProbe:
  tcpSocket:
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 5

autoscaling:
  enabled: false
  minReplicas: 3
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

volumes:
- configMap:
    defaultMode: 420
    name: mongo-ca-bundle
  name: mongo-ca-volume

volumeMounts:
- mountPath: /app/global-bundle.pem
  name: mongo-ca-volume
  subPath: global-bundle.pem

nodeSelector: {}
tolerations: []
affinity: {}
secrets:
  jwt_expires_in: ref+awssecrets://cognipeer-console-credentials-production?region=eu-central-1#/JWT_EXPIRES_IN 
  jwt_secret: ref+awssecrets://cognipeer-console-credentials-production?region=eu-central-1#/JWT_SECRET
  main_db_name: ref+awssecrets://cognipeer-console-credentials-production?region=eu-central-1#/MAIN_DB_NAME
  mongodb_uri: ref+awssecrets://cognipeer-console-credentials-production?region=eu-central-1#/MONGODB_URI
  smtp_from: ref+awssecrets://cognipeer-console-credentials-production?region=eu-central-1#/SMTP_FROM
  smtp_host: ref+awssecrets://cognipeer-console-credentials-production?region=eu-central-1#/SMTP_HOST
  smtp_port: ref+awssecrets://cognipeer-console-credentials-production?region=eu-central-1#/SMTP_PORT
  smtp_secure: ref+awssecrets://cognipeer-console-credentials-production?region=eu-central-1#/SMTP_SECURE
  smtp_user: ref+awssecrets://cognipeer-console-credentials-production?region=eu-central-1#/SMTP_USER
  smtp_pass: ref+awssecrets://cognipeer-console-credentials-production?region=eu-central-1#/SMTP_PASS

tls_secrets:
  fullchain_pem: ref+awssecrets://cognipeer-console-production-tls?region=eu-central-1#/fullchain.pem
  privatekey_pem: ref+awssecrets://cognipeer-console-production-tls?region=eu-central-1#/privkey.pem