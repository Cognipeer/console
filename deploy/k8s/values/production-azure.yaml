image:
  repository: cognipeer.azurecr.io/cognipeer-cgate
  pullPolicy: Always
  tag: "production"

cloudEnvironment: "azure"
environment: production

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
vault:
  secretPath: kv-v2/data/cgate-application-production
  role: cgate-application-production
serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: "cgate"

podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: azure-application-gateway
  annotations:
    appgw.ingress.kubernetes.io/ssl-redirect: "true"
    appgw.ingress.kubernetes.io/backend-protocol: "http"
    appgw.ingress.kubernetes.io/appgw-ssl-certificate: "tls-cert"
  hosts:
    - host: console.cognipeer.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 3
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

volumes:
  - configMap:
      defaultMode: 420
      name: mongo-ca-bundle
    name: mongo-ca-volume

volumeMounts:
  - mountPath: /app/global-bundle.pem
    name: mongo-ca-volume
    subPath: global-bundle.pem

nodeSelector: {}
tolerations: []
affinity: {}