image:
  repository: cognipeer.azurecr.io/cognipeer-cgate
  pullPolicy: Always
  tag: 'production'

environment: "productionelopment"
cloudEnvironment: azure
vaultSecretPath: "kv-v2/data/cgate-application-production"

tls_secrets:
  fullchain_pem: /fullchain.pem ## todo : eso
  privatekey_pem: /privkey.pem ## todo : eso

vault:
  secretPath: kv-v2/data/cgate-application-production
  role: cgate-application-production

ingress:
  enabled: true
  className: azure-application-gateway
  annotations:
    # kubernetes.io/ingress.class: azure/application-gateway
    appgw.ingress.kubernetes.io/ssl-redirect: "true"
    appgw.ingress.kubernetes.io/backend-protocol: "http"
    appgw.ingress.kubernetes.io/appgw-ssl-certificate: "tls-cert"
  hosts:
    - host: console.cognipeer.com
      paths:
        - path: /
          pathType: Prefix
  tls: []