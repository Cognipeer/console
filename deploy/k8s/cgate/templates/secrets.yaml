apiVersion: v1
data:
  _AWS_REGION: {{.Values.secrets._aws_region | b64enc }}
  _AWS_S3_BUCKET: {{.Values.secrets._aws_s3_bucket | b64enc }}
  MODEL_NAME: {{.Values.secrets.model_name | b64enc }}
  MONGODB_URI: {{.Values.secrets.mongodb_uri | b64enc }}
  NEXTAUTH_SECRET: {{.Values.secrets.nextauth_secret | b64enc }}
  NEXTAUTH_URL: {{.Values.secrets.nextauth_url | b64enc }}
  OPENAI_API_KEY: {{.Values.secrets.openai_api_key | b64enc }}
kind: Secret
metadata:
  name: cgate-application-secrets
type: Opaque