      operationId: listEvaluationSuites
      responses:
        "200":
          description: The configured evaluation suites.
          content:
            application/json:
              schema:
                type: object
                properties:
                  suites:
                    type: array
                    items:
                      $ref: "#/components/schemas/EvalSuite"
