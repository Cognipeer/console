              promptId:
                type: string
              versionId:
                type: string
              version:
                type: integer
              content:
                type: string
              createdBy:
                type: string
              createdByName:
                type: string
              createdAt:
                type: string
                format: date-time
              updatedAt:
                type: string
                format: date-time
    PromptCreateInput:
      type: object
      required:
        - name
        - template
