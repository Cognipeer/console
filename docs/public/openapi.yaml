      parameters:
        - name: sessionId
          in: path
          required: true
          description: Browser session database id.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Maximum number of events to return.
          schema:
            type: integer
        - name: skip
          in: query
          required: false
