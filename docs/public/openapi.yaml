          type: object
    VectorCreateProviderRequest:
      type: object
      description: Payload to create a vector provider.
      required:
        - key
        - driver
        - label
        - credentials
      properties:
        key:
          type: string
          description: Unique provider key.
          example: pinecone-prod
        driver:
          type: string
          description: Driver identifier.
          example: pinecone
        label:
          type: string
          description: Human-readable label.
          example: Production Vectors
        description:
          type: string
        credentials:
          type: object
          description: Driver-specific credentials.
        settings:
          type: object
          description: Driver-specific settings.
        capabilitiesOverride:
          type: array
          description: Optional override of provider capability flags.
          items:
            type: string
        metadata:
          type: object
        status:
          type: string
          enum:
            - active
            - inactive
          default: active
    VectorDeleteVectorsRequest:
      type: object
      description: Payload to delete vectors by ID.
      required:
        - ids
      properties:
        ids:
          type: array
          description: Vector identifiers to delete.
          minItems: 1
          items:
            type: string
          example:
            - vec-1
            - vec-2
    VectorDriverDescriptor:
      type: object
      description: Descriptor for an available provider driver.
      properties:
        id:
          type: string
          example: pinecone
        version:
          type: string
        domains:
          type: array
          items:
            type: string
        display:
          type: object
          properties:
            label:
              type: string
            description:
              type: string
            icon:
              type: string
        capabilities:
          type: object
    VectorIndex:
      type: object
      description: A vector index within a provider.
      properties:
        _id:
          type: string
        key:
          type: string
          example: products
        indexId:
          type: string
          description: Alias of `key`.
          example: products
        name:
          type: string
          example: Product Embeddings
        dimension:
          type: integer
          example: 1536
        metric:
          type: string
          enum:
            - cosine
            - euclidean
            - dotproduct
          example: cosine
        providerKey:
          type: string
        metadata:
          type: object
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    VectorMatch:
      type: object
      description: A single vector match returned from a query.
      properties:
        id:
          type: string
          example: vec-1
        score:
          type: number
          example: 0.95
        values:
          type: array
          items:
            type: number
        metadata:
          type: object
    VectorProvider:
      type: object
      description: A configured vector database provider.
      properties:
        _id:
          type: string
        key:
          type: string
          example: pinecone-prod
        driver:
          type: string
          example: pinecone
        label:
          type: string
          example: Production Vectors
        description:
          type: string
        status:
          type: string
          enum:
            - active
            - inactive
            - error
          example: active
        credentials:
          type: object
          description: Provider-specific credentials (returned redacted/encrypted).
        settings:
          type: object
        metadata:
          type: object
        capabilities:
          type: object
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    VectorProviderFormField:
      type: object
      description: A single form field definition for provider configuration.
      properties:
        name:
          type: string
        label:
          type: string
        type:
          type: string
          enum:
            - text
            - password
            - textarea
            - number
            - select
            - switch
        required:
          type: boolean
        placeholder:
          type: string
        description:
          type: string
        options:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              value:
                type: string
              description:
                type: string
        defaultValue: {}
        scope:
          type: string
          enum:
            - credentials
            - settings
            - metadata
    VectorProviderFormSchema:
      type: object
      description: Credential/settings form schema for rendering a driver configuration UI.
      properties:
        sections:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
              description:
                type: string
              fields:
                type: array
                items:
                  $ref: "#/components/schemas/VectorProviderFormField"
    VectorQueryRequest:
      type: object
      description: Payload to query similar vectors.
      required:
        - query
      properties:
        query:
          type: object
          required:
            - vector
          properties:
            vector:
              type: array
              description: Query embedding.
              items:
                type: number
            topK:
              type: integer
              minimum: 1
              default: 5
              description: Number of matches to return.
            filter:
              type: object
              description: Provider-specific filter criteria.
    VectorQueryResponse:
      type: object
      description: Result of a vector similarity query.
      properties:
        result:
          type: object
          properties:
            matches:
              type: array
              items:
                $ref: "#/components/schemas/VectorMatch"
    VectorUpdateIndexRequest:
      type: object
      description: Payload to update a vector index. Provide at least one field.
      properties:
        name:
          type: string
        metadata:
          type: object
    VectorUpsertItem:
      type: object
      description: A single vector to insert or update.
      required:
        - id
        - values
      properties:
        id:
          type: string
          example: vec-1
        values:
          type: array
          description: Embedding values.
          items:
            type: number
        metadata:
          type: object
    VectorUpsertRequest:
      type: object
      description: Payload to upsert vectors into an index.
      required:
        - vectors
      properties:
        vectors:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/VectorUpsertItem"
    WebSearchProvider:
      type: object
      description: A web search instance visible to the token.
      properties:
        key:
          type: string
          description: Instance key.
          example: brave-main
        driver:
          type: string
          description: Search engine driver.
          example: brave-search
        label:
          type: string
          description: Human-readable instance label.
          example: Brave Web
        status:
          type: string
          description: Instance status.
          example: active
        aiAnswer:
          type: boolean
          description: Whether AI answers are enabled on the instance.
    WebSearchProvidersResponse:
      type: object
      properties:
        providers:
          type: array
          description: Web search instances visible to the token.
          items:
            $ref: "#/components/schemas/WebSearchProvider"
    WebSearchRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          description: Search query.
          example: fastify v5 changes
        provider:
          type: string
          description: Instance key (generic `/websearch/search` endpoint only). Optional when the project has exactly one active instance; with multiple instances the request must name one. Ignored on the named-instance endpoint.
        count:
          type: number
          description: Maximum number of results. Default 10, max 50.
          example: 5
        offset:
          type: number
          description: Paging hint where the engine supports it.
          example: 0
        language:
          type: string
          description: ISO language override.
          example: en
        country:
          type: string
          description: Country/market override (e.g. `US`, `en-US`).
          example: US
        safe_search:
          type: string
          description: Safe-search override.
          enum:
            - off
            - moderate
            - strict
        include_answer:
          type: boolean
          description: Interpret results with the instance's AI model. Fails when AI answers are disabled on the instance.
    WebSearchResponse:
      type: object
      properties:
        id:
          type: string
          description: Ephemeral search identifier.
          example: websearch-mr87slmv
        provider:
          type: string
          description: Instance key that served the search.
        driver:
          type: string
          description: Search engine driver used.
        query:
          type: string
          description: The query that was run.
        answer:
          type: string
          nullable: true
          description: "Present when the AI interpretation ran (`include_answer: true`) or the engine returned a native answer (Tavily, Serper answer box)."
        answer_model:
          type: string
          nullable: true
          description: Set only for AI-interpreted answers; the model that produced `answer`.
        results:
          type: array
          description: Normalized results.
          items:
            $ref: "#/components/schemas/WebSearchResultItem"
        latency_ms:
          type: number
          description: Search latency in milliseconds.
    WebSearchResultItem:
      type: object
      description: A single normalized search result.
      properties:
        title:
          type: string
          description: Result title.
        url:
          type: string
          description: Result URL.
        snippet:
          type: string
          description: Result snippet.
        position:
          type: integer
          description: 1-based rank of the result.
        published_at:
          type: string
          nullable: true
          description: Publication date when known.
        source:
          type: string
          nullable: true
          description: Origin engine for metasearch instances (e.g. SearxNG).
        score:
          type: number
          nullable: true
          description: Relevance score when provided by the engine.
  responses:
    BadRequest:
      description: Bad request — missing or invalid parameters.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: model is required
    Unauthorized:
      description: Unauthorized — missing or invalid API token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: Invalid API token
    Forbidden:
      description: Forbidden — the feature is not enabled for this token, project, or license tier.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: This feature is not available in your license
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: Not found
    Conflict:
      description: Conflict — the resource already exists or is in a conflicting state.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: A resource with this key already exists
    TooManyRequests:
      description: Rate limit or quota exceeded.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: Rate limit exceeded
    InternalError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error:
              message: Internal server error
              type: server_error
