        threads:
          type: array
          items:
            $ref: "#/components/schemas/TracingThread"
        total:
          type: number
    TracingThreadSession:
      type: object
      description: A session belonging to a thread.
      properties:
        sessionId:
          type: string
        agentName:
          type: string
        agentVersion:
          type: string
        status:
          type: string
        startedAt:
          type: string
          format: date-time
          nullable: true
        endedAt:
          type: string
          format: date-time
          nullable: true
        durationMs:
          type: number
        totalEvents:
          type: number
        totalTokens:
          type: number
        totalInputTokens:
          type: number
        totalOutputTokens:
          type: number
        modelsUsed:
          type: array
          items:
            type: string
        toolsUsed:
          type: array
          items:
            type: string
    VectorCreateIndexRequest:
      type: object
      description: Payload to create a vector index.
      required:
        - name
        - dimension
