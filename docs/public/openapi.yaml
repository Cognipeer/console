        - name: sid
          in: path
          required: true
          description: Session id.
          schema:
            type: string
        - name: cmdId
          in: path
          required: true
          description: Command id returned by the session exec call.
          schema:
            type: string
        - name: follow
          in: query
          required: false
          description: When 'true', stream logs as Server-Sent Events until the command exits; otherwise return a one-shot snapshot.
          schema:
            type: string
            enum:
              - "true"
