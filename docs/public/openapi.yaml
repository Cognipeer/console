        num_requests_running:
          type: number
        num_requests_waiting:
          type: number
        prompt_tokens_throughput:
          type: number
        requests_per_second:
          type: number
        running_models:
          type: array
          items:
            type: string
        time_to_first_token_seconds:
          type: number
        timestamp:
          type: string
          format: date-time
    MonitoringOverview:
      type: object
      description: Aggregate inference-fleet counters.
      properties:
        active_servers:
          type: number
        avg_gpu_cache_usage:
          type: number
          nullable: true
        disabled_servers:
          type: number
        errored_servers:
          type: number
        running_models_count:
          type: number
        total_running_requests:
          type: number
        total_servers:
          type: number
        total_waiting_requests:
          type: number
    MonitoringServer:
      type: object
      description: One inference server with its latest metrics (apiKey stripped).
      properties:
        key:
          type: string
        name:
          type: string
        type:
          type: string
        status:
          type: string
        last_error:
          type: string
          nullable: true
        last_polled_at:
          type: string
          format: date-time
          nullable: true
        latest_metrics:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/MonitoringMetrics"
    MonitoringTypeBreakdown:
      type: object
      description: Count of servers per server type.
      properties:
        count:
          type: number
        type:
          type: string
    OcrAddFilesMultipartRequest:
      type: object
      description: Multipart body for adding files. Attach one or more files under files (or file).
      properties:
        files:
          type: array
          description: One or more files to add.
          items:
            type: string
            format: binary
        file:
          type: array
          description: Alternative field name for one or more files.
          items:
            type: string
            format: binary
        mode:
          type: string
          enum:
            - sync
            - async
          description: Processing mode. sync processes inline (200); async queues (202, default).
    OcrAddFilesRequest:
      type: object
      description: JSON body for adding files. Use items (or documents) array.
      properties:
        mode:
          type: string
          enum:
            - sync
            - async
          description: Processing mode. sync processes inline (200); async queues (202, default).
        items:
          type: array
          items:
            $ref: "#/components/schemas/OcrJobItemInput"
        documents:
          type: array
          description: Alias for items.
          items:
            $ref: "#/components/schemas/OcrJobItemInput"
    OcrCreateJobRequest:
      type: object
      required:
        - ocr_model
        - bucket_key
      properties:
        ocr_model:
          type: string
          description: OCR model key. The alias `model` is also accepted.
        bucket_key:
          type: string
          description: Storage bucket key. The alias `bucketKey` is also accepted.
        name:
          type: string
          description: Display name.
        llm_model:
          type: string
          description: LLM model key used for summary/structured outputs.
        outputs:
          type: array
          description: One or more of full_text, summary, structured. Defaults to ["full_text"].
          items:
            type: string
            enum:
              - full_text
              - summary
              - structured
        summary_prompt:
          type: string
          description: Prompt used when summary output is requested.
        structured_schema:
          type: object
          description: Schema used when structured output is requested.
          additionalProperties: true
        language:
          type: string
          description: Language hint.
        features:
          type: array
          description: OCR features to enable.
          items:
            type: string
        pdf_max_pages:
          type: integer
          description: Cap on PDF pages per file.
        callback_url:
          type: string
          description: Per-file webhook URL.
        callback_secret:
          type: string
          description: Secret used to sign callbacks.
        callback_events:
          type: array
          description: Subset of item.succeeded, item.failed.
          items:
            type: string
            enum:
              - item.succeeded
              - item.failed
        metadata:
          type: object
          description: Arbitrary metadata.
          additionalProperties: true
    OcrDocumentInput:
      type: object
      description: Document supplied by URL or as base64 bytes. Provide either url or data.
      properties:
        url:
          type: string
          description: Document URL.
        data:
          type: string
          description: Base64-encoded document bytes.
        fileName:
          type: string
          description: Original file name (with data).
        contentType:
          type: string
          description: MIME type of the document.
    OcrJob:
      type: object
      description: A persistent OCR job container with processing rules, progress counters, and rolling usage/cost totals.
      properties:
        id:
          type: string
        name:
          type: string
          nullable: true
          description: Display name.
        status:
          type: string
          enum:
            - active
            - paused
            - archived
          description: Job lifecycle status.
        bucket_key:
          type: string
        ocr_model:
          type: string
        llm_model:
          type: string
          nullable: true
          description: LLM model key used for summary/structured outputs.
        outputs:
          type: array
          items:
            type: string
            enum:
              - full_text
              - summary
              - structured
        pdf_max_pages:
          type: integer
          nullable: true
          description: Cap on PDF pages per file.
        callback_url:
          type: string
          nullable: true
          description: Per-file webhook URL.
        items_total:
          type: integer
        items_processed:
          type: integer
        items_failed:
          type: integer
        usage:
          $ref: "#/components/schemas/OcrJobUsage"
        cost_total:
          type: number
        cost_ocr:
          type: number
        cost_llm:
          type: number
        cost_currency:
          type: string
        last_item_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
    OcrJobItem:
      type: object
      description: A single file within an OCR job, with its own result, usage, and cost.
      properties:
        id:
          type: string
        index:
          type: integer
        file_name:
          type: string
          nullable: true
        status:
          type: string
          description: Item processing status (e.g. queued, succeeded, failed).
        result:
          type: object
          nullable: true
          description: Extraction output for the file.
          properties:
            fullText:
              type: string
            summary:
              type: string
            structured:
              type: object
              additionalProperties: true
          additionalProperties: true
        usage:
          type: object
          nullable: true
          description: Token usage for the item.
          additionalProperties: true
        cost_total:
          type: number
          nullable: true
        cost_currency:
          type: string
          nullable: true
        callback_status:
          type: string
          nullable: true
          description: Delivery status of the per-file callback.
        error_message:
          type: string
          nullable: true
    OcrJobItemInput:
      type: object
      description: A file to add to a job. Provide a source, or the convenience aliases bucket/document.
      properties:
        fileName:
          type: string
          description: Optional file name.
        source:
          type: object
          description: File source. One of inline, url, or bucket.
          properties:
            kind:
              type: string
              enum:
                - inline
                - url
                - bucket
            data:
              type: string
              description: Base64 bytes (kind=inline).
            url:
              type: string
              description: Document URL (kind=url).
            bucketKey:
              type: string
              description: Bucket key (kind=bucket).
            objectKey:
              type: string
              description: Object key within the bucket (kind=bucket).
            fileName:
              type: string
            contentType:
              type: string
        bucket:
          type: object
          description: Convenience bucket reference in place of source.
          properties:
            bucketKey:
              type: string
            objectKey:
              type: string
        document:
          type: object
          description: Convenience document reference (url or base64 data) in place of source.
          properties:
            url:
              type: string
            data:
              type: string
            fileName:
              type: string
            contentType:
              type: string
    OcrJobUsage:
      type: object
      description: Rolling token/page usage totals for the job.
      properties:
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        total_tokens:
          type: integer
        pages:
          type: integer
        ocr_tokens:
          type: integer
        llm_tokens:
          type: integer
    OcrJobUsageDetail:
      type: object
      description: Aggregate token and cost accounting for a job, including progress counters.
      properties:
        items_total:
          type: integer
        items_processed:
          type: integer
        items_failed:
          type: integer
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        total_tokens:
          type: integer
        pages:
          type: integer
        ocr_tokens:
          type: integer
        llm_tokens:
          type: integer
        cost_total:
          type: number
        cost_ocr:
          type: number
        cost_llm:
          type: number
        cost_currency:
          type: string
    OcrMultipartRequest:
      type: object
      required:
        - model
      description: Multipart OCR request. Supply either file or document_url.
      properties:
        model:
          type: string
          description: OCR model key.
        file:
          type: string
          format: binary
          description: Document file to extract.
        document_url:
          type: string
          description: Document URL to extract.
        pages:
          type: string
          description: Comma-separated page numbers (e.g. "1,2,5"). Only positive page numbers are kept.
        language:
          type: string
          description: Language hint for extraction.
        features:
          type: string
          description: Comma-separated OCR features (text, tables, kv_pairs, layout, reading_order, handwriting); unknown values are ignored.
        prompt:
          type: string
          description: Optional extraction guidance prompt.
    OcrRequest:
      type: object
      required:
        - model
        - document
      properties:
        model:
          type: string
          description: OCR model key.
        document:
          $ref: "#/components/schemas/OcrDocumentInput"
        pages:
          type: array
          description: Pages to process. Only positive page numbers are kept.
          items:
            type: integer
        language:
          type: string
          description: Language hint for extraction.
        features:
          type: array
          description: OCR features to enable; unknown values are ignored.
          items:
            type: string
            enum:
              - text
              - tables
              - kv_pairs
              - layout
              - reading_order
              - handwriting
        prompt:
          type: string
          description: Optional extraction guidance prompt.
    OcrResponse:
      type: object
      description: Provider OCR result with request_id merged in. Exact fields depend on the model and requested features.
      properties:
        text:
          type: string
          description: Extracted full text of the document.
        pages:
          type: array
          description: Per-page extraction detail.
          items:
            type: object
            additionalProperties: true
        request_id:
          type: string
          description: Request correlation ID.
      additionalProperties: true
    OcrUpdateJobRequest:
      type: object
      description: Any subset of these fields may be updated.
      properties:
        name:
          type: string
        status:
          type: string
          enum:
            - active
            - paused
            - archived
        ocr_model:
          type: string
        llm_model:
          type: string
        outputs:
          type: array
          description: Normalized; falls back to ["full_text"].
          items:
            type: string
            enum:
              - full_text
              - summary
              - structured
        summary_prompt:
          type: string
        structured_schema:
          type: object
          additionalProperties: true
        language:
          type: string
        pdf_max_pages:
          type: integer
        callback_url:
          type: string
        callback_secret:
          type: string
        callback_events:
          type: array
          items:
            type: string
            enum:
              - item.succeeded
              - item.failed
    PiiDetokenizeRequest:
      type: object
      required:
        - text
        - vault
      properties:
        text:
          type: string
          description: Text containing tokens (e.g. an LLM response).
          example: Blocked the session for [TC_KIMLIK_1]; flagged the IP [IPADDRESS_1].
        vault:
          allOf:
            - $ref: "#/components/schemas/PiiVault"
          description: The vault returned by a prior `/pii/tokenize` call.
    PiiDetokenizeResponse:
      type: object
      properties:
        output_text:
          type: string
          description: Text with vault tokens replaced by their original values.
    PiiFinding:
      type: object
      description: A single detected PII occurrence.
      properties:
        category:
          type: string
          description: Category of the match.
          example: iban
        value:
          type: string
          description: The matched original value.
        start:
          type: integer
          description: Start character offset of the match.
        end:
          type: integer
          description: End character offset of the match.
        severity:
          type: string
          description: Severity of the finding.
          example: high
        replacement:
          type: string
          description: Replacement text applied for the match (for redact/mask/tokenize actions).
    PiiPolicyCreateInput:
      type: object
      required:
        - name
      description: Create a PII policy definition.
      properties:
        name:
          type: string
          example: Support Intake
        defaultAction:
          type: string
          enum:
            - detect
            - redact
            - mask
            - block
            - tokenize
          description: Default action for matched categories. Defaults to `detect`.
        description:
          type: string
        categories:
          type: object
          additionalProperties:
            type: boolean
          description: Enabled detection categories keyed by category name. Defaults to the built-in category set.
        customPatterns:
          type: array
          items:
            type: object
            additionalProperties: true
          description: Custom regex detectors.
        languages:
          type: array
          items:
            type: string
            enum:
              - global
              - en
              - tr
              - de
              - fr
              - es
              - it
              - pt
              - ar
              - ja
              - zh
          description: Languages to detect. A comma-separated string is also accepted.
        enabled:
          type: boolean
          description: Defaults to true.
        metadata:
          type: object
          additionalProperties: true
    PiiPolicyRecord:
      type: object
      additionalProperties: true
      description: A stored PII policy definition.
      properties:
        id:
          type: string
        key:
          type: string
          example: support-intake
        name:
          type: string
        description:
          type: string
        defaultAction:
          type: string
          enum:
            - detect
            - redact
            - mask
            - block
            - tokenize
        categories:
          type: object
          additionalProperties:
            type: boolean
        customPatterns:
          type: array
          items:
            type: object
            additionalProperties: true
        languages:
          type: array
          items:
            type: string
            enum:
              - global
              - en
              - tr
              - de
              - fr
              - es
              - it
              - pt
              - ar
              - ja
              - zh
        enabled:
          type: boolean
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PiiPolicyRequest:
      type: object
      description: Shared request body for the policy-based PII endpoints (`detect`, `redact`, `mask`, `tokenize`, `scan`). The `action` field is only read by `/pii/scan` as an override; the named endpoints pin their own action and ignore it.
      required:
        - policy_key
        - text
      properties:
        policy_key:
          type: string
          description: Key of the stored policy to apply (managed in the dashboard under Operate → PII). `policyKey` is also accepted.
          example: support-intake
        text:
          type: string
          description: Text to scan.
          example: Wire to IBAN TR33 0006 1005 1978 6457 8413 26 before Friday
        locale:
          type: string
          description: Locale for finding labels/messages. Defaults to `en`.
          enum:
            - global
            - en
            - tr
            - de
            - fr
            - es
            - it
            - pt
            - ar
            - ja
            - zh
          default: en
        action:
          type: string
          description: "Only for `/pii/scan`: override the policy's default action. Ignored by the named endpoints."
          enum:
            - detect
            - redact
            - mask
            - block
            - tokenize
    PiiPolicyUpdateInput:
      type: object
      description: Partial update of a PII policy definition.
      properties:
        name:
          type: string
        description:
          type: string
        defaultAction:
          type: string
          enum:
            - detect
            - redact
            - mask
            - block
            - tokenize
        categories:
          type: object
          additionalProperties:
            type: boolean
        customPatterns:
          type: array
          items:
            type: object
            additionalProperties: true
        languages:
          type: array
          items:
            type: string
            enum:
              - global
              - en
              - tr
              - de
              - fr
              - es
              - it
              - pt
              - ar
              - ja
              - zh
        enabled:
          type: boolean
        metadata:
          type: object
          additionalProperties: true
    PiiScanResponse:
      type: object
      properties:
        policy_key:
          type: string
          description: Key of the applied policy.
        policy_name:
          type: string
          description: Display name of the applied policy.
        action:
          type: string
          description: The action applied.
          enum:
            - detect
            - redact
            - mask
            - block
            - tokenize
        findings:
          type: array
          description: Detected occurrences.
          items:
            $ref: "#/components/schemas/PiiFinding"
        output_text:
          type: string
          description: The transformed text (equals input for `detect`).
        input_length:
          type: integer
          description: Character length of the input.
        has_blocking:
          type: boolean
          description: Whether any finding is blocking.
        languages:
          type: array
          description: Languages used for the scan (from the policy).
          items:
            type: string
          example:
            - global
            - tr
        vault:
          allOf:
            - $ref: "#/components/schemas/PiiVault"
          description: Only present when the effective action is `tokenize`.
    PiiVault:
      type: object
      description: Token → original-value map returned by tokenize. Keys are tokens like `[EMAIL_1]`.
      additionalProperties:
        $ref: "#/components/schemas/PiiVaultEntry"
    PiiVaultEntry:
      type: object
      description: A vault entry mapping a token to its original value and category.
      properties:
        value:
          type: string
          description: The original PII value.
        category:
          type: string
          description: Category of the original value.
    PromptCompare:
      type: object
      description: Side-by-side comparison of two prompt versions.
      properties:
        fromVersion:
          $ref: "#/components/schemas/PromptVersionSummary"
        toVersion:
          $ref: "#/components/schemas/PromptVersionSummary"
        templateDiff:
          type: array
          description: Line-level diff of the two templates.
          items:
            type: object
            properties:
              type:
                type: string
                enum:
                  - added
                  - removed
                  - unchanged
              line:
                type: string
        metadataDiff:
          type: array
          description: Key-level diff of the two versions' metadata.
          items:
            type: object
            properties:
