          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /evaluation/suites/{key}/run:
    post:
      tags:
        - Evaluation
      summary: Run an evaluation suite
