  /memory/stores/{storeKey}/memories:
    get:
      tags:
        - Memory
      summary: List memories
      description: Lists memory items in the store identified by `storeKey`. Supports scope, tag, status, search, and pagination filters.
      operationId: listMemoryItems
      parameters:
        - name: storeKey
          in: path
          required: true
          description: Unique key of the memory store.
          schema:
            type: string
        - name: scope
          in: query
          required: false
          description: Filter by memory scope.
          schema:
            type: string
            enum:
              - user
              - agent
              - session
              - global
        - name: scopeId
          in: query
          required: false
          description: Filter by scope id.
          schema:
            type: string
        - name: tags
          in: query
          required: false
          description: Comma-separated tag filter.
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Filter by memory status.
          schema:
            type: string
            enum:
              - active
              - archived
              - expired
        - name: search
          in: query
          required: false
          description: Full-text search in content.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Page size (default 50).
          schema:
            type: integer
            default: 50
        - name: skip
          in: query
          required: false
          description: Offset for pagination.
          schema:
            type: integer
      responses:
        "200":
          description: Paginated list of memory items.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/MemoryItem"
                  total:
                    type: integer
                    description: Total number of matching items.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags:
        - Memory
      summary: Add memory
      description: Adds a single memory item to the store identified by `storeKey`. The embedding is generated automatically from the content.
      operationId: addMemory
      parameters:
        - name: storeKey
          in: path
          required: true
          description: Unique key of the memory store.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryCreateRequest"
      responses:
        "201":
          description: The created memory item.
          content:
            application/json:
              schema:
                type: object
                properties:
                  memory:
                    $ref: "#/components/schemas/MemoryItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags:
        - Memory
      summary: Bulk delete memories
      description: Delete memories in a store in bulk, optionally filtered by scope, scope id, and/or tags. With no filters, clears the entire store.
      operationId: bulkDeleteMemories
      parameters:
        - name: storeKey
          in: path
          required: true
          schema:
            type: string
          description: Memory store key.
        - name: scope
          in: query
          required: false
          schema:
            type: string
            enum:
              - user
              - agent
              - session
              - global
          description: Only delete memories in this scope.
        - name: scopeId
          in: query
          required: false
          schema:
            type: string
          description: Only delete memories with this scope id (e.g. a specific user or session id).
        - name: tags
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated tags; only delete memories matching all of them.
      responses:
        "200":
          description: Number of memories deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                    description: Count of deleted memories.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /memory/stores/{storeKey}/memories/batch:
