              - inactive
              - error
            example: active
      responses:
        "200":
          description: List of vector providers
          content:
            application/json:
              schema:
                type: object
                properties:
                  providers:
                    type: array
                    items:
                      $ref: "#/components/schemas/VectorProvider"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags:
        - Vector
      summary: Create vector provider
      description: Create a new vector database provider configuration for the current project. Requires `key`, `driver`, `label`, and `credentials`.
      operationId: createVectorProvider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VectorCreateProviderRequest"
            example:
              key: pinecone-prod
              driver: pinecone
              label: Production Vectors
              credentials:
                apiKey: pk-...
              settings:
                environment: gcp-starter
      responses:
        "201":
          description: Vector provider created
          content:
            application/json:
              schema:
                type: object
                properties:
                  provider:
                    $ref: "#/components/schemas/VectorProvider"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"
  /vector/providers/drivers:
    get:
      tags:
        - Vector
      summary: List vector provider drivers
      description: Return the available provider driver descriptors for the given domain (defaults to `vector`).
      operationId: listVectorProviderDrivers
      parameters:
        - name: domain
          in: query
          required: false
          description: Provider domain to list drivers for. Defaults to `vector`.
          schema:
            type: string
            default: vector
            example: vector
      responses:
        "200":
          description: Available driver descriptors
          content:
            application/json:
              schema:
                type: object
                properties:
                  drivers:
                    type: array
                    items:
                      $ref: "#/components/schemas/VectorDriverDescriptor"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /vector/providers/drivers/{driverId}/form:
    get:
      tags:
        - Vector
      summary: Get vector driver form schema
      description: Return the credential/settings form schema and descriptor for a specific vector driver, used for UI rendering.
      operationId: getVectorProviderDriverForm
      parameters:
        - name: driverId
          in: path
          required: true
          description: Driver identifier (e.g. `pinecone`).
          schema:
            type: string
      responses:
        "200":
          description: Driver form schema
          content:
            application/json:
              schema:
                type: object
                properties:
                  descriptor:
                    $ref: "#/components/schemas/VectorDriverDescriptor"
                  driverId:
                    type: string
                  schema:
                    $ref: "#/components/schemas/VectorProviderFormSchema"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /vector/providers/{providerKey}/indexes:
    get:
      tags:
        - Vector
      summary: List vector indexes
      description: List all indexes for a specific vector provider.
      operationId: listVectorIndexes
      parameters:
        - name: providerKey
          in: path
          required: true
          description: Unique key of the vector provider.
          schema:
            type: string
      responses:
        "200":
          description: List of vector indexes
          content:
            application/json:
              schema:
                type: object
                properties:
                  indexes:
                    type: array
                    items:
                      $ref: "#/components/schemas/VectorIndex"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags:
        - Vector
      summary: Create vector index
      description: "Create a new vector index. If an index with the same normalized name already exists it is reused and returned with `reused: true` and a `200` status; otherwise a new index is created and returned with `201`."
      operationId: createVectorIndex
      parameters:
        - name: providerKey
          in: path
          required: true
          description: Unique key of the vector provider.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VectorCreateIndexRequest"
            example:
              name: Product Embeddings
              dimension: 1536
              metric: cosine
      responses:
        "200":
          description: Existing index reused (same normalized name)
          content:
            application/json:
              schema:
                type: object
                properties:
                  index:
                    $ref: "#/components/schemas/VectorIndex"
                  reused:
                    type: boolean
                    example: true
        "201":
          description: Vector index created
          content:
            application/json:
              schema:
                type: object
                properties:
                  index:
                    $ref: "#/components/schemas/VectorIndex"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"
  /vector/providers/{providerKey}/indexes/{externalId}:
    get:
      tags:
        - Vector
      summary: Get vector index
      description: Retrieve details of a specific vector index along with its provider.
      operationId: getVectorIndex
      parameters:
        - name: providerKey
          in: path
          required: true
          description: Unique key of the vector provider.
          schema:
            type: string
        - name: externalId
          in: path
          required: true
          description: External identifier (key) of the vector index.
          schema:
            type: string
      responses:
        "200":
          description: Vector index details
          content:
            application/json:
              schema:
                type: object
                properties:
                  index:
                    $ref: "#/components/schemas/VectorIndex"
                  provider:
                    $ref: "#/components/schemas/VectorProvider"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags:
        - Vector
      summary: Update vector index
      description: Update the name and/or metadata of an existing vector index. At least one updatable field must be provided.
      operationId: updateVectorIndex
      parameters:
        - name: providerKey
          in: path
          required: true
          description: Unique key of the vector provider.
          schema:
            type: string
        - name: externalId
          in: path
          required: true
          description: External identifier (key) of the vector index.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VectorUpdateIndexRequest"
            example:
              name: Updated Name
              metadata:
                description: Updated metadata
      responses:
        "200":
          description: Vector index updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  index:
                    $ref: "#/components/schemas/VectorIndex"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags:
        - Vector
      summary: Delete vector index
      description: Delete a vector index and all of its stored data.
      operationId: deleteVectorIndex
      parameters:
        - name: providerKey
          in: path
          required: true
          description: Unique key of the vector provider.
          schema:
            type: string
        - name: externalId
          in: path
          required: true
          description: External identifier (key) of the vector index.
          schema:
            type: string
      responses:
        "200":
          description: Vector index deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /vector/providers/{providerKey}/indexes/{externalId}/query:
    post:
      tags:
        - Vector
      summary: Query vectors
      description: Search for the most similar vectors in the index using a query vector, optional `topK` and provider-specific `filter`.
      operationId: queryVectors
      parameters:
        - name: providerKey
          in: path
          required: true
          description: Unique key of the vector provider.
          schema:
            type: string
        - name: externalId
          in: path
          required: true
          description: External identifier (key) of the vector index.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VectorQueryRequest"
            example:
              query:
                vector:
                  - 0.1
                  - 0.2
                  - 0.3
                topK: 10
                filter:
                  category: electronics
      responses:
        "200":
          description: Query results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VectorQueryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"
  /vector/providers/{providerKey}/indexes/{externalId}/upsert:
    post:
      tags:
        - Vector
      summary: Upsert vectors
      description: Insert or update vectors in the index. Each vector must include a string `id` and a numeric `values` array.
      operationId: upsertVectors
      parameters:
        - name: providerKey
          in: path
          required: true
          description: Unique key of the vector provider.
          schema:
            type: string
        - name: externalId
          in: path
          required: true
          description: External identifier (key) of the vector index.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VectorUpsertRequest"
            example:
              vectors:
                - id: vec-1
                  values:
                    - 0.1
                    - 0.2
                  metadata:
                    category: electronics
                - id: vec-2
                  values:
                    - 0.3
                    - 0.4
                  metadata:
                    category: books
      responses:
        "200":
          description: Vectors upserted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"
  /vector/providers/{providerKey}/indexes/{externalId}/vectors:
    delete:
      tags:
        - Vector
      summary: Delete vectors
      description: Delete specific vectors by ID from the index. Provide a non-empty `ids` array of vector identifiers.
      operationId: deleteVectors
      parameters:
        - name: providerKey
          in: path
          required: true
          description: Unique key of the vector provider.
          schema:
            type: string
        - name: externalId
          in: path
          required: true
          description: External identifier (key) of the vector index.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VectorDeleteVectorsRequest"
            example:
              ids:
                - vec-1
                - vec-2
      responses:
        "200":
          description: Vectors deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalError"
  /websearch/providers:
    get:
      tags:
        - Web Search
      summary: List web search instances
      description: Returns the web search instances (providers) visible to the token's project. `aiAnswer` reports whether AI answers are enabled on the instance. Gated by the `websearch` RBAC service.
      operationId: listWebSearchProviders
      parameters: []
      responses:
        "200":
          description: Web search instances visible to the token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebSearchProvidersResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /websearch/search:
    post:
      tags:
        - Web Search
      summary: Run a web search
      description: Runs a web search against the project's single active instance, or against the instance named in the `provider` body field. Gated by the `websearch` RBAC service. `include_answer` requires the instance to have AI answers enabled, otherwise the request fails.
      operationId: runWebSearch
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebSearchRequest"
      responses:
        "200":
          description: Normalized search result across drivers.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebSearchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /websearch/{key}/search:
    post:
      tags:
        - Web Search
      summary: Run a web search on a named instance
      description: Runs a web search on the web search instance identified by `key`. The instance is taken from the path; any `provider` field in the body is ignored. Gated by the `websearch` RBAC service. `include_answer` requires the instance to have AI answers enabled, otherwise the request fails.
      operationId: runWebSearchWithInstance
      parameters:
        - name: key
          in: path
          required: true
          description: Web search instance key to search with.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebSearchRequest"
      responses:
        "200":
          description: Normalized search result across drivers.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebSearchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: "Console API token. Create one in the dashboard under Settings → API Tokens. Format: `cpeer_...`"
  schemas:
    AegisAuditEvent:
      type: object
      description: One recorded shield decision.
      properties:
        traceId:
          type: string
        shieldId:
          type: string
        actorId:
          type: string
        stage:
          type: string
          enum:
            - input.pre
            - retrieval.pre
            - retrieval.post
            - tool.pre
            - tool.post
            - output.pre
        resourceName:
          type: string
        decision:
          type: string
          enum:
            - allow
            - redact
            - require_approval
            - sandbox
            - block
        riskScore:
          type: number
        reasons:
          type: array
          items:
            type: string
        policyVersion:
          type: string
        at:
          type: string
      required:
        - traceId
        - shieldId
        - actorId
        - stage
        - resourceName
        - decision
        - riskScore
        - reasons
        - policyVersion
        - at
    AegisEvaluateRequest:
      type: object
      description: A call to evaluate against a shield's policy.
      properties:
        stage:
          type: string
          enum:
            - input.pre
            - retrieval.pre
            - retrieval.post
            - tool.pre
            - tool.post
            - output.pre
          description: Pipeline stage being evaluated.
        actor:
          type: object
          description: Who is making the call. Defaults `id` to the token's user when omitted.
          properties:
            id:
              type: string
            roles:
              type: array
              items:
                type: string
        resource:
          type: object
          description: The tool call / content under evaluation.
          properties:
            type:
              type: string
            name:
              type: string
            arguments:
              type: object
              additionalProperties: true
            content: {}
            result: {}
          required:
            - type
            - name
        shieldId:
          type: string
          description: Target shield; defaults to the built-in `default` shield.
        traceId:
          type: string
          description: Optional trace correlation id (one is generated when omitted).
        context:
          type: object
          description: Evaluation context. Additional keys are allowed.
          additionalProperties: true
          properties:
            projectId:
              type: string
            model:
              type: string
            agent:
              type: string
            approvalToken:
              type: string
              description: Token minted by an approved `require_approval` decision.
            sandboxAvailable:
              type: boolean
              description: When true, side-effectful calls decide `sandbox` instead of `require_approval`.
      required:
        - stage
        - resource
    AegisEvaluation:
      type: object
      description: The result of evaluating a call against a shield.
      properties:
        traceId:
          type: string
        shieldId:
          type: string
        shieldMode:
          type: string
          enum:
            - enforce
            - simulate
            - disabled
        decision:
          type: string
          enum:
            - allow
            - redact
            - require_approval
            - sandbox
            - block
        enforced:
          type: boolean
          description: False when the shield is simulating/disabled — the decision is advisory.
        riskScore:
          type: number
        reasons:
          type: array
          items:
            type: string
        policyVersion:
          type: string
        findings:
          type: array
          items:
            $ref: "#/components/schemas/AegisFinding"
        mutations:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              action:
                type: string
                enum:
                  - redact
                  - remove
              replacement:
                type: string
            required:
              - path
              - action
        sanitizedResource:
          type: object
          description: The resource with sensitive values redacted — execute with THIS, not the original.
          additionalProperties: true
        approval:
          type: object
          description: "Present on `require_approval`: approve in the Console, then re-run with `context.approvalToken`."
          properties:
            approvalId:
              type: string
            expiresAt:
              type: string
            scope:
              type: string
              enum:
                - call_bound
          required:
            - approvalId
            - expiresAt
            - scope
      required:
        - traceId
        - shieldId
        - shieldMode
        - decision
        - enforced
        - riskScore
        - reasons
        - policyVersion
        - findings
        - mutations
    AegisFinding:
      type: object
      properties:
        code:
          type: string
        severity:
          type: string
          enum:
            - low
            - medium
            - high
            - critical
        reason:
          type: string
        path:
          type: string
      required:
        - code
        - severity
        - reason
    AegisShield:
      type: object
      description: An Aegis enforcement instance — one protected surface with its own policy and DLP settings.
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        mode:
          type: string
          enum:
            - enforce
            - simulate
            - disabled
        rules:
          $ref: "#/components/schemas/AegisToolRule"
        dlp:
          type: object
          properties:
            redactSecrets:
              type: boolean
            redactPii:
              type: boolean
            semantic:
              type: boolean
          required:
            - redactSecrets
            - redactPii
        llm:
          type: object
          properties:
            modelKey:
              type: string
            judge:
              type: object
              properties:
                enabled:
                  type: boolean
                stages:
                  type: array
                  items:
                    type: string
                    enum:
                      - input.pre
                      - retrieval.pre
                      - retrieval.post
                      - tool.pre
                      - tool.post
                      - output.pre
                threshold:
                  type: number
                failMode:
                  type: string
                  enum:
                    - open
                    - closed
                onlyHighRisk:
                  type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - mode
        - rules
        - dlp
        - createdAt
        - updatedAt
    AegisToolRule:
      type: object
      description: A shield's tool/egress/path policy.
      properties:
        allow:
          type: array
          items:
            type: string
        deny:
          type: array
          items:
            type: string
        sideEffects:
          type: object
          additionalProperties:
            type: string
            enum:
              - none
              - read
              - write
              - destructive
              - external
        allowedRoles:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        allowedDomains:
          type: array
          items:
            type: string
        deniedDomains:
          type: array
          items:
            type: string
          description: Deny wins over allow and also matches subdomains.
        allowedPathPrefixes:
          type: array
          items:
            type: string
        deniedPathPrefixes:
          type: array
          items:
            type: string
        argumentSchemas:
          type: object
          additionalProperties: true
        limits:
          type: object
          properties:
            perActorPerMinute:
              type: integer
            perToolPerMinute:
              type: integer
            maxArgBytes:
              type: integer
            maxResultBytes:
              type: integer
    AgentA2aArtifact:
      type: object
      description: An A2A task artifact carrying the assistant reply.
      properties:
        artifactId:
          type: string
        name:
          type: string
        parts:
          type: array
          items:
            $ref: "#/components/schemas/AgentA2aPart"
    AgentA2aMessage:
      type: object
      description: An inbound A2A message.
      properties:
        role:
          type: string
          description: Message role (e.g. `user`).
        parts:
          type: array
          description: Message parts; text parts are concatenated into the user message.
          items:
            $ref: "#/components/schemas/AgentA2aPart"
        messageId:
          type: string
        contextId:
          type: string
          description: Conversation/context id to continue an existing conversation. Omit to start a new one.
        metadata:
          type: object
          additionalProperties: true
          description: Optional metadata. `runtime_context` here is forwarded to downstream targets (see AgentRuntimeContext).
    AgentA2aPart:
      type: object
      description: An A2A message/artifact part. Only text parts (`kind` `text` or omitted) are read.
      properties:
        kind:
          type: string
          description: Part kind, e.g. `text`.
        text:
          type: string
          description: Text content of the part.
    AgentA2aRpcError:
      type: object
      description: JSON-RPC error object.
      properties:
        code:
          type: integer
          description: JSON-RPC / A2A error code (e.g. -32601 method not found, -32602 invalid params, -32001 task not found, -32004 unsupported operation, -32603 internal error, -32700 parse error).
        message:
          type: string
    AgentA2aRpcParams:
      type: object
      description: Method-dependent JSON-RPC params. `message` is used by `message/send`; `id` is used by `tasks/get` and `tasks/cancel`.
      properties:
        message:
          $ref: "#/components/schemas/AgentA2aMessage"
        id:
          type: string
          description: Task id for `tasks/get` / `tasks/cancel` (format `task_{conversationId}_{messageIndex}`).
    AgentA2aRpcRequest:
      type: object
      description: JSON-RPC 2.0 request envelope for the A2A endpoint.
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
        id:
          description: Request id echoed back on the response.
          nullable: true
          oneOf:
            - type: string
            - type: integer
        method:
          type: string
          enum:
            - message/send
            - tasks/get
            - tasks/cancel
          description: A2A method to invoke.
        params:
          $ref: "#/components/schemas/AgentA2aRpcParams"
      required:
        - jsonrpc
        - method
    AgentA2aRpcResponse:
      type: object
      description: JSON-RPC 2.0 response envelope. Exactly one of `result` or `error` is present.
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
        id:
          nullable: true
          oneOf:
            - type: string
            - type: integer
        result:
          $ref: "#/components/schemas/AgentA2aTask"
        error:
          $ref: "#/components/schemas/AgentA2aRpcError"
    AgentA2aTask:
      type: object
      description: A completed A2A task returned by `message/send` and `tasks/get`.
      properties:
        kind:
          type: string
          enum:
            - task
        id:
          type: string
          description: Task id (format `task_{conversationId}_{messageIndex}`).
        contextId:
          type: string
          description: Conversation/context id (equals the conversation id).
        status:
          $ref: "#/components/schemas/AgentA2aTaskStatus"
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/AgentA2aArtifact"
    AgentA2aTaskStatus:
      type: object
      description: Terminal task status.
      properties:
        state:
          type: string
          enum:
            - completed
        timestamp:
          type: string
          format: date-time
    AgentCard:
      type: object
      description: A2A Agent Card (discovery document) as defined by the Agent-to-Agent protocol.
      properties:
        protocolVersion:
          type: string
          description: A2A protocol version.
        name:
          type: string
        description:
          type: string
        url:
          type: string
          description: JSON-RPC endpoint for this agent.
        preferredTransport:
          type: string
          example: JSONRPC
        provider:
          type: object
          properties:
            organization:
              type: string
            url:
              type: string
        version:
          type: string
          description: Published agent version ("0" if unpublished).
        capabilities:
          type: object
          properties:
            streaming:
              type: boolean
            pushNotifications:
              type: boolean
            stateTransitionHistory:
              type: boolean
        defaultInputModes:
          type: array
          items:
            type: string
          example:
            - text/plain
        defaultOutputModes:
          type: array
          items:
            type: string
          example:
            - text/plain
        skills:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              description:
                type: string
              tags:
                type: array
                items:
                  type: string
              inputModes:
                type: array
                items:
                  type: string
              outputModes:
                type: array
                items:
                  type: string
        securitySchemes:
          type: object
          description: Empty for public agents; otherwise a bearer scheme requiring a Cognipeer API token.
          additionalProperties: true
        security:
          type: array
          items:
            type: object
            additionalProperties: true
    AgentConfig:
      type: object
      description: Resolved model configuration for an agent.
      properties:
        modelKey:
          type: string
          description: Key of the underlying model the agent runs on.
        temperature:
          type: number
          nullable: true
          description: Sampling temperature override.
        topP:
          type: number
          nullable: true
          description: Nucleus sampling (top-p) override.
        maxTokens:
          type: integer
          nullable: true
          description: Maximum output tokens.
    AgentConfigInput:
      type: object
      additionalProperties: true
      description: "Agent configuration. For native agents `modelKey` is required; for connected agents set `kind: external` and supply `connection`."
      properties:
        kind:
          type: string
          enum:
            - external
          nullable: true
          description: Set to `external` for a connected agent. Omit for a native (model-backed) agent.
        modelKey:
          type: string
          description: Key of the model to run on. Required for native agents.
        connection:
          $ref: "#/components/schemas/AgentConnectionInput"
        temperature:
          type: number
          nullable: true
          description: Sampling temperature override.
        topP:
          type: number
          nullable: true
          description: Nucleus sampling (top-p) override.
        maxTokens:
          type: integer
          nullable: true
          description: Maximum output tokens.
        systemPrompt:
          type: string
          description: System prompt / instructions for the agent.
    AgentConnectionInput:
      type: object
      additionalProperties: true
      description: Connection descriptor for an external ("connected") agent. On update, omit `apiKey` to keep the stored credential.
      properties:
        provider:
          type: string
          description: Upstream provider identifier for the connected agent.
        baseUrl:
          type: string
          description: Base URL of the external agent endpoint.
        apiKey:
          type: string
          description: Inline API key. Encrypted at rest and never returned; the response exposes only `hasApiKey`.
    AgentCreateInput:
      type: object
      required:
        - name
        - config
      description: Create an agent definition.
      properties:
        name:
          type: string
          description: Human-readable agent name.
          example: Support Triage
        description:
          type: string
          description: Optional description.
        status:
          type: string
          enum:
            - active
            - inactive
            - draft
          description: Initial status. Defaults to the service default when omitted.
        config:
          $ref: "#/components/schemas/AgentConfigInput"
    AgentDetailResponse:
      type: object
      description: Response body for a single agent lookup.
      properties:
        agent:
          $ref: "#/components/schemas/AgentSummary"
    AgentInputContentPart:
      type: object
      description: A structured content part within a message item.
      properties:
        type:
          type: string
          enum:
            - input_text
          description: Content part type; only `input_text` is read.
        text:
          type: string
          description: The text content of the part.
      required:
        - type
        - text
    AgentInputMessage:
      type: object
      description: A single message item. The most recent item with role `user` is used as the user message.
      properties:
        role:
          type: string
          description: Message role; only `user` items are read for the input message.
        content:
          description: "Message content: a plain string, or an array of structured content parts."
          oneOf:
            - type: string
            - type: array
              items:
                $ref: "#/components/schemas/AgentInputContentPart"
      required:
        - role
        - content
    AgentListResponse:
      type: object
      description: Response body for listing agents.
      properties:
        agents:
          type: array
          description: The agents visible to the token's project.
          items:
            $ref: "#/components/schemas/AgentSummary"
    AgentPublishInput:
      type: object
      description: Publish the current draft config as a new immutable version.
      properties:
        changelog:
          type: string
          description: Optional changelog note recorded on the published version.
    AgentRecord:
      type: object
      additionalProperties: true
      description: A stored agent definition with secret material redacted.
      properties:
        _id:
          type: string
          description: Internal agent id.
        key:
          type: string
          description: Stable agent key (used as the `model` field when running the agent).
          example: support-triage
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum:
            - active
            - inactive
            - draft
        tenantId:
          type: string
        projectId:
          type: string
        config:
          type: object
          additionalProperties: true
          description: "Stored config. Secret material is redacted: a connected agent's `connection` carries `hasApiKey` (boolean) instead of the encrypted key."
          properties:
            kind:
              type: string
              nullable: true
            modelKey:
              type: string
            connection:
              type: object
              additionalProperties: true
              properties:
                hasApiKey:
                  type: boolean
                  description: Whether an inline API key is stored (the key itself is never returned).
        latestVersion:
          type: integer
          nullable: true
        publishedVersion:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AgentResponse:
      type: object
      description: OpenAI Responses API-compatible response object.
      properties:
        id:
          type: string
          description: Response ID in the form `resp_{conversationId}`.
        object:
          type: string
          enum:
            - response
        model:
          type: string
          description: Agent key that produced the response.
        output:
          type: array
          description: Ordered output items (reasoning and/or assistant messages).
          items:
            $ref: "#/components/schemas/AgentResponseOutputItem"
        status:
          type: string
          enum:
            - completed
            - failed
        usage:
          $ref: "#/components/schemas/AgentResponseUsage"
        created_at:
          type: integer
          description: Unix timestamp (seconds) when the response was created.
        previous_response_id:
          type: string
          nullable: true
          description: The `previous_response_id` supplied on the request, if any.
        version:
          type: integer
          nullable: true
          description: Agent version used for this response, or null if not versioned.
    AgentResponseOutputItem:
      description: "An output item: an assistant message or a reasoning item."
      oneOf:
        - $ref: "#/components/schemas/AgentResponseOutputMessage"
        - $ref: "#/components/schemas/AgentResponseReasoningItem"
    AgentResponseOutputMessage:
      type: object
      description: An assistant message output item.
      properties:
        id:
          type: string
        type:
          type: string
          enum:
            - message
        role:
          type: string
          enum:
            - assistant
        content:
          type: array
          items:
            $ref: "#/components/schemas/AgentResponseOutputText"
    AgentResponseOutputText:
      type: object
      description: An output text content item.
      properties:
        type:
          type: string
          enum:
            - output_text
        text:
          type: string
          description: The generated text.
    AgentResponseReasoningItem:
      type: object
      description: A reasoning ("thinking") output item.
      properties:
        id:
          type: string
        type:
          type: string
          enum:
            - reasoning
        summary:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum:
                  - summary_text
              text:
                type: string
    AgentResponseUsage:
      type: object
      description: Token usage for the response.
      properties:
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        total_tokens:
          type: integer
    AgentResponsesRequest:
      type: object
      description: OpenAI Responses API-compatible request to invoke an agent.
      properties:
        model:
          type: string
          description: Agent key identifying the agent to run.
        input:
          description: "User message: a plain string, or an array of message items."
          oneOf:
            - type: string
            - type: array
              items:
                $ref: "#/components/schemas/AgentInputMessage"
        previous_response_id:
          type: string
          nullable: true
          description: ID (`resp_{conversationId}`) from a previous response, to continue a multi-turn conversation.
        version:
          type: integer
          minimum: 1
          nullable: true
          description: Specific published version to run (positive integer).
        runtime_context:
          $ref: "#/components/schemas/AgentRuntimeContext"
      required:
        - model
        - input
    AgentRuntimeContext:
      type: object
      description: Caller-supplied runtime context. Headers offered to downstream tools/MCP/connected agents (subject to per-target passthrough policy), plus optional per-target overrides and free-form metadata. Server-stamped fields (userId, tokenId, source) are not client-writable.
      properties:
        headers:
          type: object
          additionalProperties:
            type: string
          description: Headers offered to every outbound target.
        connections:
          type: object
          description: Per-target header overrides, keyed by a bare record key or a kind-prefixed key (`tool:<key>`, `mcp:<key>`, `agent:<key>`). Target-scoped headers win over the global `headers` map.
          additionalProperties:
            type: object
            properties:
              headers:
                type: object
                additionalProperties:
                  type: string
        metadata:
          type: object
          additionalProperties: true
          description: Free-form caller metadata surfaced to logs/traces.
    AgentSummary:
      type: object
      description: Public representation of an agent.
      properties:
        key:
          type: string
          description: Unique agent key.
        name:
          type: string
          description: Human-readable agent name.
        description:
          type: string
          nullable: true
          description: Optional agent description.
        config:
          $ref: "#/components/schemas/AgentConfig"
        status:
          type: string
          enum:
            - active
            - inactive
            - draft
          description: Agent lifecycle status.
        createdAt:
          type: string
          format: date-time
          description: When the agent was created.
    AgentUpdateInput:
      type: object
      additionalProperties: true
      description: Partial update of an agent definition. Only supplied fields are changed.
      properties:
        name:
          type: string
          description: Updated name.
        description:
          type: string
          description: Updated description.
        status:
          type: string
          enum:
            - active
            - inactive
            - draft
          description: Updated status.
        config:
          $ref: "#/components/schemas/AgentConfigInput"
        metadata:
          type: object
          additionalProperties: true
          description: Arbitrary metadata. An `a2a` sub-object updates A2A exposure; the endpoint slug is server-owned and preserved.
    AgentVersionRecord:
      type: object
      additionalProperties: true
      description: A published, immutable agent version snapshot.
      properties:
        version:
          type: integer
          description: Monotonic version number assigned to this publish.
          example: 3
        agentKey:
          type: string
        changelog:
          type: string
          nullable: true
        snapshot:
          type: object
          additionalProperties: true
          description: Frozen snapshot of the agent at publish time.
          properties:
            name:
              type: string
            description:
              type: string
            status:
              type: string
        publishedBy:
          type: string
          description: User id that published the version.
        createdAt:
          type: string
          format: date-time
    AnalyticsDailyPoint:
      type: object
      description: One day of the overview series.
      properties:
        date:
          type: string
        sessionsCount:
          type: number
        totalTokens:
          type: number
    AnalyticsEntityEntry:
      type: object
      description: Per-entity attribution row. `user_id` is present when `group_by=user`; `api_token_id` is present when `group_by=token`.
      properties:
        user_id:
          type: string
        api_token_id:
          type: string
        name:
          type: string
          nullable: true
        label:
          type: string
          nullable: true
        requests:
          type: number
        errors:
          type: number
        input_tokens:
          type: number
        output_tokens:
          type: number
        total_tokens:
          type: number
        cost:
          type: number
    AnalyticsModelEntry:
      type: object
      description: Per-model usage aggregate.
      properties:
        model_key:
          type: string
        model_name:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        provider_key:
          type: string
          nullable: true
        calls:
          type: number
        input_tokens:
          type: number
        output_tokens:
          type: number
        total_tokens:
          type: number
        cost:
          type: number
    AnalyticsOverview:
      type: object
      description: Dashboard rollup for the token's project.
      properties:
        object:
          type: string
          enum:
            - analytics.overview
        stats:
          $ref: "#/components/schemas/AnalyticsOverviewStats"
        recent_sessions:
          type: array
          items:
            $ref: "#/components/schemas/AnalyticsRecentSession"
        daily:
          type: array
          items:
            $ref: "#/components/schemas/AnalyticsDailyPoint"
    AnalyticsOverviewStats:
      type: object
      description: Dashboard aggregate counters. Inner keys are camelCase, mirroring the dashboard payload.
      properties:
        models:
          type: object
          properties:
            total:
              type: number
            llm:
              type: number
            embedding:
              type: number
        vectors:
          type: object
          properties:
            providers:
              type: number
            indexes:
              type: number
        tracing:
          type: object
          properties:
            totalSessions:
              type: number
            totalTokens:
              type: number
            activeSessions:
              type: number
        apiCalls:
          type: object
          properties:
            total:
              type: number
            trend:
              type: number
              description: Percentage change.
    AnalyticsRecentSession:
      type: object
      description: Recent tracing session summary (camelCase, passed through from the tracing service).
      properties:
        sessionId:
          type: string
        agentName:
          type: string
        status:
          type: string
        startedAt:
          type: string
          format: date-time
        durationMs:
          type: number
        totalEvents:
          type: number
        totalTokens:
          type: number
    AnalyticsServiceEntry:
      type: object
      description: Per-service usage aggregate.
      properties:
        service:
          type: string
        requests:
          type: number
        errors:
          type: number
        input_tokens:
          type: number
        output_tokens:
          type: number
        total_tokens:
          type: number
        cost:
          type: number
    AnalyticsTimeseriesPoint:
      type: object
      description: One time-series bucket at the requested interval.
      properties:
        period:
          type: string
        calls:
          type: number
        total_tokens:
          type: number
        cost:
          type: number
    AnalyticsUsageEntity:
      type: object
      description: "Usage response when `group_by=user` or `group_by=token`: per-entity attribution from the usage rollup."
      properties:
        object:
          type: string
          enum:
            - analytics.usage
        group_by:
          type: string
          enum:
            - user
            - token
        from:
          type: string
          nullable: true
          description: Rollup day (YYYY-MM-DD) or null.
        to:
          type: string
          nullable: true
          description: Rollup day (YYYY-MM-DD) or null.
        currency:
          type: string
        totals:
          $ref: "#/components/schemas/AnalyticsUsageEntityTotals"
        breakdown:
          type: array
          items:
            $ref: "#/components/schemas/AnalyticsEntityEntry"
    AnalyticsUsageEntityTotals:
      type: object
      description: Aggregate totals for the per-entity (`user`/`token`) and `service` envelopes.
      properties:
        requests:
          type: number
        errors:
          type: number
        input_tokens:
          type: number
        output_tokens:
          type: number
        total_tokens:
          type: number
        cost:
          type: number
    AnalyticsUsageModel:
      type: object
      description: "Usage response when `group_by=model`: per-model aggregates plus an interval time-series."
      properties:
        object:
          type: string
          enum:
            - analytics.usage
        group_by:
          type: string
          enum:
            - model
        interval:
          type: string
          enum:
            - hour
            - day
            - month
        from:
          type: string
          format: date-time
          nullable: true
        to:
          type: string
          format: date-time
          nullable: true
        currency:
          type: string
        totals:
          $ref: "#/components/schemas/AnalyticsUsageModelTotals"
        by_model:
          type: array
          items:
            $ref: "#/components/schemas/AnalyticsModelEntry"
        timeseries:
          type: array
          items:
            $ref: "#/components/schemas/AnalyticsTimeseriesPoint"
    AnalyticsUsageModelTotals:
      type: object
      description: Aggregate totals for the `group_by=model` envelope.
      properties:
        cost:
          type: number
        calls:
          type: number
        input_tokens:
          type: number
        output_tokens:
          type: number
        total_tokens:
          type: number
    AnalyticsUsageService:
      type: object
      description: "Usage response when `group_by=service`: per-service breakdown across all services."
      properties:
        object:
          type: string
          enum:
            - analytics.usage
        group_by:
          type: string
          enum:
            - service
        from:
          type: string
          nullable: true
          description: Rollup day (YYYY-MM-DD) or null.
        to:
          type: string
          nullable: true
          description: Rollup day (YYYY-MM-DD) or null.
        currency:
          type: string
        totals:
          $ref: "#/components/schemas/AnalyticsUsageEntityTotals"
        breakdown:
          type: array
          items:
            $ref: "#/components/schemas/AnalyticsServiceEntry"
    AudioBase64Input:
      type: object
      description: Audio supplied inline as base64-encoded bytes.
      required:
        - data
      properties:
        data:
          type: string
          description: Base64-encoded audio bytes.
        fileName:
          type: string
          description: Original file name of the audio.
        contentType:
          type: string
          description: MIME type of the audio (e.g. audio/mpeg).
    AudioSpeechRequest:
      type: object
      required:
        - model
        - input
      properties:
        model:
          type: string
          description: TTS model key.
        input:
          type: string
          description: Text to synthesize.
        voice:
          type: string
          description: Voice name. If omitted, the provider falls back to its default voice.
        response_format:
          type: string
          enum:
            - mp3
            - opus
            - aac
            - flac
            - wav
            - pcm
          description: Output audio format. Invalid values are ignored and the provider default is used.
        speed:
          type: number
          description: Playback speed multiplier.
        instructions:
          type: string
          description: Free-form delivery/style instructions.
    AudioTranscriptionJsonRequest:
      type: object
      required:
        - model
        - audio
      properties:
        model:
          type: string
          description: STT model key.
        audio:
          $ref: "#/components/schemas/AudioBase64Input"
        language:
          type: string
          description: Source language hint (e.g. en).
        prompt:
          type: string
          description: Optional text to guide the model.
        response_format:
          type: string
          description: Transcript format (e.g. json, text, verbose_json).
        temperature:
          type: number
          description: Sampling temperature.
        timestamp_granularities:
          type: array
          description: One or more of word, segment.
          items:
            type: string
            enum:
              - word
              - segment
    AudioTranscriptionMultipartRequest:
      type: object
      required:
        - model
        - file
      properties:
        model:
          type: string
          description: STT model key.
        file:
          type: string
          format: binary
          description: Audio file to transcribe.
        language:
          type: string
          description: Source language hint (e.g. en).
        prompt:
          type: string
          description: Optional text to guide the model.
        response_format:
          type: string
          description: Transcript format (e.g. json, text, verbose_json).
        temperature:
          type: number
          description: Sampling temperature.
        timestamp_granularities[]:
          type: array
          description: One or more of word, segment.
          items:
            type: string
            enum:
              - word
              - segment
    AudioTranscriptionResponse:
      type: object
      description: Transcription result. The exact shape depends on response_format; verbose_json adds segment/word detail.
      properties:
        text:
          type: string
          description: The transcribed text.
        request_id:
          type: string
          description: Request correlation ID.
    AudioTranslationJsonRequest:
      type: object
      required:
        - model
        - audio
      properties:
        model:
          type: string
          description: STT model key.
        audio:
          $ref: "#/components/schemas/AudioBase64Input"
        prompt:
          type: string
          description: Optional text to guide the model.
        response_format:
          type: string
          description: Transcript format (e.g. json, text, verbose_json).
        temperature:
          type: number
          description: Sampling temperature.
    AudioTranslationMultipartRequest:
      type: object
      required:
        - model
        - file
      properties:
        model:
          type: string
          description: STT model key.
        file:
          type: string
          format: binary
          description: Audio file to translate.
        prompt:
          type: string
          description: Optional text to guide the model.
        response_format:
          type: string
          description: Transcript format (e.g. json, text, verbose_json).
        temperature:
          type: number
          description: Sampling temperature.
    AudioTranslationResponse:
      type: object
      description: Translation result (English). The exact shape depends on response_format.
      properties:
        text:
          type: string
          description: The translated English text.
        request_id:
          type: string
          description: Request correlation ID.
    AuditLog:
      type: object
      description: A sanitized audit log entry (`_id` stringified as `id`).
      properties:
        id:
          type: string
        tenantId:
          type: string
        projectId:
          type: string
        requestId:
          type: string
        actorType:
          type: string
          enum:
            - user
            - api_token
            - system
        actorUserId:
          type: string
        actorEmail:
          type: string
        actorRole:
          type: string
        apiTokenId:
          type: string
        service:
          type: string
        action:
          type: string
        event:
          type: string
        method:
          type: string
        path:
          type: string
        statusCode:
          type: number
        outcome:
          type: string
          enum:
            - success
            - failure
            - denied
        ipAddress:
          type: string
        userAgent:
          type: string
        resourceType:
          type: string
        resourceId:
          type: string
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
    AuditLogList:
      type: object
      description: A list envelope of sanitized audit log entries.
      properties:
        object:
          type: string
          enum:
            - list
        data:
          type: array
          items:
            $ref: "#/components/schemas/AuditLog"
    AutomationView:
      type: object
      description: Live view of a platform automation (background scheduler or maintenance job).
      required:
        - key
        - name
        - description
        - domain
        - cadenceLabel
        - distributed
        - metrics
        - state
        - supportsPause
        - supportsTrigger
        - lastStartedAt
        - lastCompletedAt
        - lastDurationMs
        - lastError
      properties:
        key:
          type: string
          description: Stable automation key.
          enum:
            - alert-evaluation
            - browser-session-reaper
            - browser-session-reconciliation
            - inference-monitoring-poll
        name:
          type: string
          description: Display name.
        description:
          type: string
          description: What the automation does.
        domain:
          type: string
          description: Functional area.
          enum:
            - alerts
            - browser
            - monitoring
        cadenceLabel:
          type: string
          description: Human cadence, e.g. 'Every 30s' or 'Manual maintenance'.
        distributed:
          type: boolean
          description: Whether runs are guarded by a distributed lock across instances.
        metrics:
          type: object
          description: Per-automation metrics; keys vary by domain (e.g. firedCount/processedTenants for alert-evaluation, dueServers for inference-monitoring-poll, liveSessions for browser-session-reaper).
          additionalProperties: true
        state:
          type: string
          description: Derived live state.
          enum:
            - active
            - degraded
            - idle
            - paused
            - running
        supportsPause:
          type: boolean
          description: Whether pause/resume are available.
        supportsTrigger:
          type: boolean
          description: Whether an immediate run can be triggered.
        lastStartedAt:
          type: string
          format: date-time
          nullable: true
          description: ISO timestamp of the last run start.
        lastCompletedAt:
          type: string
          format: date-time
          nullable: true
          description: ISO timestamp of the last run completion.
        lastDurationMs:
          type: integer
          nullable: true
          description: Duration of the last run, in milliseconds.
        lastError:
          type: string
          nullable: true
          description: Error message from the last run, if any.
    BatchCreateRequest:
      type: object
      description: Batch creation payload. Provide `requests` inline or `input_file`, but not both.
      properties:
        endpoint:
          type: string
          description: Target endpoint every line runs against.
          enum:
            - /v1/chat/completions
            - /v1/embeddings
        requests:
          type: array
          description: Inline request lines. Required unless `input_file` is given.
          items:
            $ref: "#/components/schemas/BatchInlineRequest"
        input_file:
          nullable: true
          description: A JSONL source stored in a bucket. Mutually exclusive with `requests`.
          allOf:
            - $ref: "#/components/schemas/BatchFileRef"
        output_bucket_key:
          type: string
          description: When set, the result JSONL is written to this bucket on completion (`object_key` filled in by the finalizer).
        completion_window:
          type: string
          description: Informational (OpenAI compat); defaults to `24h`.
        metadata:
          type: object
          additionalProperties: true
          description: Arbitrary key/value metadata echoed back on the batch.
      required:
        - endpoint
    BatchFileRef:
      type: object
      description: A reference to a JSONL object stored in a Document Store bucket.
      properties:
        bucket_key:
          type: string
          description: The bucket key.
        object_key:
          type: string
          nullable: true
          description: The object key within the bucket. May be null on an output file until the finalizer fills it in.
    BatchInlineRequest:
      type: object
      description: A single inline request line. If no `body` key is present, the object itself is treated as the body.
      properties:
        custom_id:
          type: string
          description: Optional caller-supplied line identifier echoed back on the item and result.
        body:
          type: object
          additionalProperties: true
          description: "The request payload. Must include `model`. For `/v1/chat/completions`, `messages` (array) is required; for `/v1/embeddings`, `input` is required. `stream: true` is rejected."
      required:
        - body
    BatchItem:
      type: object
      description: Per-line execution status within a batch.
      properties:
        id:
          type: string
          description: The item id.
        object:
          type: string
          description: Always `batch.item`.
          example: batch.item
        index:
          type: integer
          description: Zero-based position of the line in the batch.
        custom_id:
          type: string
          nullable: true
          description: The caller-supplied line identifier, if any.
        status:
          type: string
          description: Item execution status.
          enum:
            - pending
            - running
            - succeeded
            - failed
            - cancelled
        response_status_code:
          type: integer
          nullable: true
          description: HTTP status code of the underlying request.
        response_body:
          type: object
          additionalProperties: true
          nullable: true
          description: The model response body when succeeded, otherwise null.
        error_message:
          type: string
          nullable: true
          description: Error message when the item failed.
        usage:
          nullable: true
          description: Token usage, or null until the item runs.
          allOf:
            - $ref: "#/components/schemas/BatchItemUsage"
        started_at:
          type: integer
          nullable: true
          description: Item start time in Unix seconds.
        ended_at:
          type: integer
          nullable: true
          description: Item end time in Unix seconds.
    BatchItemList:
      type: object
      description: A list envelope of batch item objects.
      properties:
        object:
          type: string
          description: Always `list`.
          example: list
        data:
          type: array
          items:
            $ref: "#/components/schemas/BatchItem"
    BatchItemUsage:
      type: object
      description: Token usage for a single item. Null until the item runs.
      properties:
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        total_tokens:
          type: integer
    BatchList:
      type: object
      description: A list envelope of batch objects.
      properties:
        object:
          type: string
          description: Always `list`.
          example: list
        data:
          type: array
          items:
            $ref: "#/components/schemas/BatchObject"
    BatchObject:
      type: object
      description: An asynchronous bulk-inference batch job.
      properties:
        id:
          type: string
          description: The batch id.
        object:
          type: string
          description: Always `batch`.
          example: batch
        endpoint:
          type: string
          description: Target endpoint the lines run against.
          example: /v1/chat/completions
        status:
          type: string
          description: Batch lifecycle status.
          enum:
            - validating
            - in_progress
            - completed
            - failed
            - cancelling
            - cancelled
        completion_window:
          type: string
          nullable: true
          description: Informational completion window (OpenAI compat), e.g. `24h`.
        input_file:
          nullable: true
          description: The JSONL input file reference, or null when the batch was created with inline `requests`.
          allOf:
            - $ref: "#/components/schemas/BatchFileRef"
        output_file:
          nullable: true
          description: The JSONL output file reference when `output_bucket_key` was set and the batch finalized, otherwise null.
          allOf:
            - $ref: "#/components/schemas/BatchFileRef"
        error_message:
          type: string
          nullable: true
          description: Batch-level error message, if any.
        request_counts:
          $ref: "#/components/schemas/BatchRequestCounts"
        usage:
          $ref: "#/components/schemas/BatchUsage"
        metadata:
          type: object
          additionalProperties: true
          description: Arbitrary metadata echoed back on the batch.
        created_at:
          type: integer
          nullable: true
          description: Creation time in Unix seconds.
        started_at:
          type: integer
          nullable: true
          description: Start time in Unix seconds.
        completed_at:
          type: integer
          nullable: true
          description: Completion time in Unix seconds.
        cancelled_at:
          type: integer
          nullable: true
          description: Cancellation time in Unix seconds.
    BatchRequestCounts:
      type: object
      description: Per-status item counts for the batch.
      properties:
        total:
          type: integer
          description: Total number of request lines.
        completed:
          type: integer
          description: Number of items that succeeded.
        failed:
          type: integer
          description: Number of items that failed.
        cancelled:
          type: integer
          description: Number of items that were cancelled.
    BatchUsage:
      type: object
      description: Aggregate token usage across the batch.
      properties:
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        total_tokens:
          type: integer
    BrowserAccessRules:
      type: object
      description: Host allow/block rules applied to navigation.
      properties:
        allowList:
          type: array
          description: Host patterns the browser is allowed to navigate to.
          items:
            type: string
        blockList:
          type: array
          description: Host patterns to block. Evaluated after allowList.
          items:
            type: string
    BrowserAction:
      description: A single browser action. The `type` field discriminates the variant.
      oneOf:
        - type: object
          required:
            - type
            - url
          properties:
            type:
              type: string
              enum:
                - goto
            url:
              type: string
              format: uri
              description: Fully-qualified URL including scheme.
            waitUntil:
              type: string
              enum:
                - load
                - domcontentloaded
                - networkidle
            timeout:
              type: integer
        - type: object
          required:
            - type
          description: Click an element. Either selector or ref is required.
          properties:
            type:
              type: string
              enum:
                - click
            selector:
              type: string
            ref:
              type: string
            button:
              type: string
              enum:
                - left
                - right
                - middle
            timeout:
              type: integer
        - type: object
          required:
            - type
          description: Hover an element. Either selector or ref is required.
          properties:
            type:
              type: string
              enum:
                - hover
            selector:
              type: string
            ref:
              type: string
            timeout:
              type: integer
        - type: object
          required:
            - type
            - text
          description: Type text into a field. Either selector or ref is required.
          properties:
            type:
              type: string
              enum:
                - type
            selector:
              type: string
            ref:
              type: string
            text:
              type: string
              maxLength: 10000
            delay:
              type: integer
            clear:
              type: boolean
        - type: object
          required:
            - type
            - key
          description: Press a keyboard key. Either selector or ref is required.
          properties:
            type:
              type: string
              enum:
                - press
            selector:
              type: string
            ref:
              type: string
            key:
              type: string
        - type: object
          required:
            - type
          description: Wait for a fixed duration or a selector state. Either ms or selector is required.
          properties:
            type:
              type: string
              enum:
                - wait
            selector:
              type: string
            ms:
              type: integer
            state:
              type: string
              enum:
                - attached
                - detached
                - visible
                - hidden
        - type: object
          required:
            - type
          description: Scroll the page or an element. Provide selector/ref or x/y coordinates.
          properties:
            type:
              type: string
              enum:
                - scroll
            selector:
              type: string
            ref:
              type: string
            x:
              type: integer
            y:
              type: integer
    BrowserActionResult:
      type: object
      description: Result of running a browser action.
      properties:
        ok:
          type: boolean
        url:
          type: string
        pageTitle:
          type: string
        ariaSnapshot:
          type: string
          description: Aria reference snapshot of the page after the action (YAML).
        artifact:
          $ref: "#/components/schemas/BrowserArtifactRef"
        errorMessage:
          type: string
    BrowserArtifactRef:
      type: object
      description: Reference to a persisted artifact (screenshot / PDF) in a Files bucket.
      properties:
        bucketKey:
          type: string
        fileId:
          type: string
        objectKey:
          type: string
        url:
          type: string
          description: Relative download URL for the artifact object.
        contentType:
          type: string
    BrowserArtifactResult:
      type: object
      description: Result of persisting a screenshot or PDF.
      properties:
        artifact:
          $ref: "#/components/schemas/BrowserArtifactRef"
        eventId:
          type: string
          description: Id of the session event recorded for this capture.
    BrowserCloseResult:
      type: object
      properties:
        closed:
          type: boolean
    BrowserCreateRequest:
      type: object
      required:
        - name
      properties:
        key:
          type: string
          description: Optional lowercase kebab-case unique key (auto-generated when omitted).
        name:
          type: string
          minLength: 2
          maxLength: 120
        description:
          type: string
          maxLength: 1000
        status:
          type: string
          enum:
            - active
            - disabled
        artifactBucketKey:
          type: string
          maxLength: 120
        defaultSessionConfig:
          $ref: "#/components/schemas/BrowserSessionConfig"
        defaultModelKey:
          type: string
          maxLength: 120
        defaultRunOptions:
          $ref: "#/components/schemas/BrowserRunOptions"
        metadata:
          type: object
          additionalProperties: true
    BrowserExtractRequest:
      type: object
      description: Extract text/html/attribute from the page. Either selector or ref is required; attribute is required when mode is `attr`.
      properties:
        selector:
          type: string
        ref:
          type: string
        mode:
          type: string
          enum:
            - text
            - html
            - attr
        attribute:
          type: string
        multiple:
          type: boolean
          description: When true, extract from all matching elements.
    BrowserExtractResult:
      type: object
      description: Result of an extract operation.
      properties:
        ok:
          type: boolean
        values:
          type: array
          items:
            type: string
        errorMessage:
          type: string
    BrowserJsonRpcRequest:
      type: object
      required:
        - method
      description: A JSON-RPC 2.0 request for the browser MCP server.
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
        id:
          description: Request id (string, number or null).
          oneOf:
            - type: string
            - type: number
          nullable: true
        method:
          type: string
          description: "One of: initialize, notifications/initialized, ping, tools/list, tools/call."
        params:
          type: object
          additionalProperties: true
          description: "Method parameters. For tools/call: { name, arguments }."
    BrowserJsonRpcResponse:
      type: object
      description: A JSON-RPC 2.0 response from the browser MCP server.
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
        id:
          oneOf:
            - type: string
            - type: number
          nullable: true
        result:
          type: object
          additionalProperties: true
          description: "Present on success. For tools/list this is { tools: [...] }; for tools/call this is { content: [{ type, text }], isError }."
        error:
          type: object
          description: Present on JSON-RPC error.
          properties:
            code:
              type: integer
            message:
              type: string
    BrowserMcpTool:
      type: object
      description: A Browser Use-compatible MCP tool descriptor (browser_navigate, browser_click, …).
      properties:
        name:
          type: string
        description:
          type: string
        inputSchema:
          type: object
          additionalProperties: true
    BrowserPdfRequest:
      type: object
      properties:
        format:
          type: string
          enum:
            - A4
            - Letter
            - Legal
            - A3
            - A5
        landscape:
          type: boolean
        printBackground:
          type: boolean
    BrowserProfile:
      type: object
      description: A reusable browser profile (parent container) holding shared session defaults, artifact bucket and default model/runtime metadata.
      properties:
        id:
          type: string
        tenantId:
          type: string
        projectId:
          type: string
          nullable: true
        key:
          type: string
          description: URL-friendly unique identifier scoped to the tenant/project.
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum:
            - active
            - disabled
        artifactBucketKey:
          type: string
          description: Default Files bucket where screenshots / PDFs are persisted.
        defaultSessionConfig:
          $ref: "#/components/schemas/BrowserSessionConfig"
        defaultModelKey:
          type: string
        defaultRunOptions:
          $ref: "#/components/schemas/BrowserRunOptions"
        metadata:
          type: object
          additionalProperties: true
        createdBy:
          type: string
        updatedBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    BrowserRunOptions:
      type: object
      description: Default agent runtime knobs applied when running agents under this browser.
      properties:
        maxSteps:
          type: integer
        temperature:
          type: number
        runtimeProfile:
          type: string
    BrowserScreenshotRequest:
      type: object
      properties:
        fullPage:
          type: boolean
        selector:
          type: string
        ref:
          type: string
        type:
          type: string
          enum:
            - png
            - jpeg
        quality:
          type: integer
          minimum: 1
          maximum: 100
          description: JPEG quality (only used when type is jpeg).
    BrowserSession:
      type: object
      description: A live browser automation session belonging to a browser profile.
      properties:
        id:
          type: string
        tenantId:
          type: string
        projectId:
          type: string
          nullable: true
        browserId:
          type: string
          description: Parent browser profile that owns this session.
        sessionKey:
          type: string
          description: Stable session key exposed to clients.
        name:
          type: string
        agentId:
          type: string
        agentKey:
          type: string
        status:
          type: string
          enum:
            - pending
            - running
            - idle
            - closed
            - errored
            - expired
        config:
          $ref: "#/components/schemas/BrowserSessionConfig"
        currentUrl:
          type: string
        pageTitle:
          type: string
        lastActivityAt:
          type: string
          format: date-time
        lastScreenshot:
          type: object
          description: Reference to the last persisted screenshot artifact.
          properties:
            bucketKey:
              type: string
            fileId:
              type: string
            objectKey:
              type: string
            capturedAt:
              type: string
              format: date-time
        artifactBucketKey:
          type: string
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
        errorMessage:
          type: string
        eventCount:
          type: integer
        metadata:
          type: object
          additionalProperties: true
        createdBy:
          type: string
        updatedBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    BrowserSessionConfig:
      type: object
      description: Browser session configuration applied to a spawned session.
      properties:
        headless:
          type: boolean
        viewport:
          type: object
          properties:
            width:
              type: integer
            height:
              type: integer
        userAgent:
          type: string
        locale:
          type: string
        idleTimeoutMs:
          type: integer
          description: Auto-close after this many ms of inactivity.
        maxLifetimeMs:
          type: integer
          description: Hard upper bound on session lifetime (ms).
        actionTimeoutMs:
          type: integer
          description: Default per-action timeout (click/hover/type/snapshot).
        navigationTimeoutMs:
          type: integer
          description: Default navigation timeout (goto).
        access:
          $ref: "#/components/schemas/BrowserAccessRules"
    BrowserSessionCreateRequest:
      type: object
      required:
        - browserId
      properties:
        browserId:
          type: string
          minLength: 1
          maxLength: 128
          description: Parent browser profile id.
        name:
          type: string
          maxLength: 120
        agentKey:
          type: string
          maxLength: 120
        agentId:
          type: string
          maxLength: 128
        artifactBucketKey:
          type: string
          maxLength: 120
        config:
          $ref: "#/components/schemas/BrowserSessionConfig"
        metadata:
          type: object
          additionalProperties: true
    BrowserSessionEvent:
      type: object
      description: A single recorded event in a browser session timeline.
      properties:
        id:
          type: string
        tenantId:
          type: string
        projectId:
          type: string
          nullable: true
        sessionId:
          type: string
        sequence:
          type: integer
          description: Sequence index for ordering within a session.
        type:
          type: string
          enum:
            - create
            - goto
            - click
            - hover
            - type
            - press
            - wait
            - scroll
            - extract
            - snapshot
            - screenshot
            - pdf
            - tool_call
            - agent_event
            - close
            - error
        status:
          type: string
          enum:
            - success
            - error
        url:
          type: string
        selector:
          type: string
        ref:
          type: string
        durationMs:
          type: integer
        artifact:
          type: object
          properties:
            bucketKey:
              type: string
            fileId:
              type: string
            objectKey:
              type: string
            contentType:
              type: string
        data:
          type: object
          additionalProperties: true
          description: Compact, sanitized payload (not raw HTML / large blobs).
        errorMessage:
          type: string
        createdAt:
          type: string
          format: date-time
    BrowserSnapshotResult:
      type: object
      description: Aria snapshot of the current page.
      properties:
        ariaSnapshot:
          type: string
          description: Aria-snapshot of the page (YAML).
        url:
          type: string
    BrowserUpdateRequest:
      type: object
      description: Partial update of a browser profile. All fields optional.
      properties:
        key:
          type: string
        name:
          type: string
          minLength: 2
          maxLength: 120
        description:
          type: string
          maxLength: 1000
        status:
          type: string
          enum:
            - active
            - disabled
        artifactBucketKey:
          type: string
          maxLength: 120
        defaultSessionConfig:
          $ref: "#/components/schemas/BrowserSessionConfig"
        defaultModelKey:
          type: string
          maxLength: 120
        defaultRunOptions:
          $ref: "#/components/schemas/BrowserRunOptions"
        metadata:
          type: object
          additionalProperties: true
    ChatChoice:
      type: object
      properties:
        index:
          type: integer
          description: Index of the choice in the list.
        message:
          $ref: "#/components/schemas/ChatMessage"
        finish_reason:
          type: string
          enum:
            - stop
            - length
            - tool_calls
            - content_filter
          description: Reason the model stopped generating tokens.
    ChatCompletionRequest:
      type: object
      required:
        - model
        - messages
      properties:
        model:
          type: string
          description: Model key configured in the dashboard (e.g., gpt-4, gpt-3.5-turbo).
          example: gpt-4
        messages:
          type: array
          description: Ordered list of messages that make up the conversation.
          items:
            $ref: "#/components/schemas/ChatMessage"
        temperature:
          type: number
          minimum: 0
          maximum: 2
          default: 1
          description: Sampling temperature between 0 and 2.
        top_p:
          type: number
          minimum: 0
          maximum: 1
          default: 1
          description: Nucleus sampling probability mass.
        max_tokens:
          type: integer
          minimum: 1
          description: Maximum number of tokens to generate in the response.
        max_completion_tokens:
          type: integer
          minimum: 1
          description: Alternative to `max_tokens` for the maximum number of completion tokens; takes precedence when both are supplied.
        stream:
          type: boolean
          default: false
          description: When true, partial deltas are returned as a `text/event-stream` of SSE chunks.
        stop:
          description: Up to a few sequences where generation stops.
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        presence_penalty:
          type: number
          minimum: -2
          maximum: 2
          default: 0
          description: Penalizes new tokens based on whether they already appear in the text.
        frequency_penalty:
          type: number
          minimum: -2
          maximum: 2
          default: 0
          description: Penalizes new tokens based on their existing frequency in the text.
        user:
          type: string
          description: Opaque end-user identifier for abuse monitoring.
        request_id:
          type: string
          description: Optional client-provided correlation identifier echoed back on the response.
        tools:
          type: array
          description: List of tools (functions) the model may call.
          items:
            $ref: "#/components/schemas/ChatTool"
        tool_choice:
          description: Controls which (if any) tool the model calls.
          oneOf:
            - type: string
              enum:
                - none
                - auto
            - type: object
    ChatCompletionResponse:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the chat completion.
        object:
          type: string
          example: chat.completion
          description: The object type, always `chat.completion`.
        created:
          type: integer
          description: Unix timestamp (seconds) of when the completion was created.
        model:
          type: string
          description: The model key used for the completion.
        choices:
          type: array
          description: List of completion choices.
          items:
            $ref: "#/components/schemas/ChatChoice"
        usage:
          $ref: "#/components/schemas/ChatUsage"
        request_id:
          type: string
          description: Correlation identifier for the request.
    ChatMessage:
      type: object
      required:
        - role
      properties:
        role:
          type: string
          enum:
            - system
            - user
            - assistant
            - tool
          description: The role of the message author.
        content:
          type: string
          nullable: true
          description: The text content of the message. May be null for assistant messages that only contain tool calls.
        name:
          type: string
          description: Optional name of the author of this message.
        tool_calls:
          type: array
          description: Tool calls generated by the model, present on assistant messages.
          items:
            $ref: "#/components/schemas/ChatToolCall"
        tool_call_id:
          type: string
          description: For `tool` role messages, the id of the tool call this message responds to.
    ChatTool:
      type: object
      required:
        - type
        - function
      properties:
        type:
          type: string
          enum:
            - function
          description: The type of the tool; currently always `function`.
        function:
          type: object
          required:
            - name
          properties:
            name:
              type: string
              description: The name of the function to be called.
            description:
              type: string
              description: A description of what the function does, used by the model to decide when to call it.
            parameters:
              type: object
              description: The parameters the function accepts, described as a JSON Schema object.
    ChatToolCall:
      type: object
      required:
        - id
        - type
        - function
      properties:
        id:
          type: string
          description: The id of the tool call.
        type:
          type: string
          enum:
            - function
          description: The type of the tool call; currently always `function`.
        function:
          type: object
          properties:
            name:
              type: string
              description: The name of the function to call.
            arguments:
              type: string
              description: The function arguments as a JSON-encoded string.
    ChatUsage:
      type: object
      properties:
        prompt_tokens:
          type: integer
          description: Number of tokens in the prompt.
        completion_tokens:
          type: integer
          description: Number of tokens in the generated completion.
        total_tokens:
          type: integer
          description: Total number of tokens used (prompt + completion).
        cached_tokens:
          type: integer
          description: Number of prompt tokens served from cache, when supported.
    ConfigAuditLog:
      type: object
      description: An audit trail entry for a config item.
      properties:
        _id:
          type: string
        configKey:
          type: string
          description: Key of the audited config item.
        action:
          type: string
          enum:
            - create
            - read
            - update
            - delete
          description: Action that was performed.
        version:
          type: integer
          description: Item version at the time of the action.
        performedBy:
          type: string
          description: Identifier of the actor.
        createdAt:
          type: string
          format: date-time
    ConfigGroup:
      type: object
      description: A container that organizes related config items.
      properties:
        _id:
          type: string
          description: Unique identifier.
        key:
          type: string
          description: Unique key of the group.
        name:
          type: string
          description: Human-readable name.
        description:
          type: string
          nullable: true
          description: Description.
        tags:
          type: array
          items:
            type: string
          description: Categorization tags.
        metadata:
          type: object
          additionalProperties: true
          description: Custom metadata.
        createdBy:
          type: string
          description: Identifier of the creator.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ConfigGroupCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Human-readable name.
        key:
          type: string
          description: Unique key (auto-generated from name if omitted).
        description:
          type: string
          description: Description.
        tags:
          type: array
          items:
            type: string
          description: Categorization tags.
        metadata:
          type: object
          additionalProperties: true
          description: Custom metadata.
    ConfigGroupUpdateRequest:
      type: object
      properties:
        name:
          type: string
          description: Human-readable name.
        description:
          type: string
          description: Description.
        tags:
          type: array
          items:
            type: string
          description: Categorization tags.
        metadata:
          type: object
          additionalProperties: true
          description: Custom metadata.
    ConfigGroupWithItems:
      allOf:
        - $ref: "#/components/schemas/ConfigGroup"
        - type: object
          properties:
            items:
              type: array
              description: Config items belonging to the group. Secret values are masked.
              items:
                $ref: "#/components/schemas/ConfigItem"
    ConfigItem:
      type: object
      description: A configuration value belonging to a group. Secret values are masked in list/get responses.
      properties:
        _id:
          type: string
          description: Unique identifier.
        key:
          type: string
          description: Unique key of the item.
        groupId:
          type: string
          description: Identifier of the parent group.
        name:
          type: string
          description: Human-readable name.
        description:
          type: string
          nullable: true
          description: Description.
        value:
          type: string
          description: Configuration value. Masked when the item is a secret.
        valueType:
          type: string
          enum:
            - string
            - number
            - boolean
            - json
          description: Type of the stored value.
        isSecret:
          type: boolean
          description: Whether the value is encrypted at rest.
        tags:
          type: array
          items:
            type: string
          description: Categorization tags.
        metadata:
          type: object
          additionalProperties: true
          description: Custom metadata.
        version:
          type: integer
          description: Monotonic version incremented on each update.
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ConfigItemCreateRequest:
      type: object
      required:
        - name
        - value
      properties:
        name:
          type: string
          description: Human-readable name.
        key:
          type: string
          description: Unique key (auto-generated from name if omitted).
        description:
          type: string
          description: Description.
        value:
          type: string
          description: Configuration value.
        valueType:
          type: string
          enum:
            - string
            - number
            - boolean
            - json
          default: string
          description: Type of the stored value.
        isSecret:
          type: boolean
          default: false
          description: Encrypt the value at rest.
        tags:
          type: array
          items:
            type: string
          description: Categorization tags.
        metadata:
          type: object
          additionalProperties: true
          description: Custom metadata.
    ConfigItemUpdateRequest:
      type: object
      description: All fields are optional.
      properties:
        name:
          type: string
          description: Human-readable name.
        description:
          type: string
          description: Description.
        value:
          type: string
          description: Configuration value. Re-encrypted automatically for secrets.
        valueType:
          type: string
          enum:
            - string
            - number
            - boolean
            - json
          description: Type of the stored value.
        isSecret:
          type: boolean
          description: Whether the value is encrypted at rest.
        tags:
          type: array
          items:
            type: string
          description: Categorization tags.
        metadata:
          type: object
          additionalProperties: true
          description: Custom metadata.
    ConfigResolveRequest:
      type: object
      required:
        - keys
      properties:
        keys:
          type: array
          description: Config item keys to resolve. Maximum 50 per request.
          items:
            type: string
          minItems: 1
          maxItems: 50
    ConfigResolvedValue:
      type: object
      description: A decrypted config value.
      properties:
        value:
          type: string
          description: Decrypted value.
        valueType:
          type: string
          enum:
            - string
            - number
            - boolean
            - json
          description: Type of the stored value.
        version:
          type: integer
          description: Current version of the item.
    Crawler:
      type: object
      description: A saved crawler profile.
      properties:
        id:
          type: string
        key:
          type: string
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum:
            - active
            - disabled
        engine:
          type: string
          enum:
            - axios
            - playwright
            - auto
        maxDepth:
          type: integer
        maxPages:
          type: integer
        autoCrawl:
          type: boolean
        seeds:
          type: array
          items:
            type: string
            format: uri
        scope:
          $ref: "#/components/schemas/CrawlerScope"
        http:
          $ref: "#/components/schemas/CrawlerHttpOptions"
        downloadableMimes:
          type: array
          items:
            type: string
        markdownOptions:
          $ref: "#/components/schemas/CrawlerMarkdownOptions"
        rag:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/CrawlerRag"
        webhook:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/CrawlerWebhook"
        schedule:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/CrawlerSchedule"
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CrawlerAdhocRunInput:
      type: object
      description: Fields for a one-off crawl without saving a crawler.
      required:
        - seeds
      properties:
        seeds:
          type: array
          minItems: 1
          maxItems: 50
          items:
            type: string
            format: uri
          description: 1-50 seed URLs.
        engine:
          type: string
          enum:
            - axios
            - playwright
            - auto
          default: auto
        maxDepth:
          type: integer
          minimum: 0
          maximum: 3
          default: 0
        maxPages:
          type: integer
          minimum: 0
          maximum: 5000
          default: 20
        autoCrawl:
          type: boolean
          default: false
        scope:
          $ref: "#/components/schemas/CrawlerScope"
        http:
          $ref: "#/components/schemas/CrawlerHttpOptions"
        downloadableMimes:
          type: array
          items:
            type: string
        markdownOptions:
          $ref: "#/components/schemas/CrawlerMarkdownOptions"
        rag:
          $ref: "#/components/schemas/CrawlerRag"
        webhook:
          $ref: "#/components/schemas/CrawlerWebhook"
        callbackUrl:
          type: string
          format: uri
          description: Per-run webhook receiver.
        mode:
          type: string
          enum:
            - sync
            - async
          description: Run mode. Omit to use the API default (async).
        metadata:
          type: object
          additionalProperties: true
    CrawlerCookie:
      type: object
      description: A cookie sent with crawl requests.
      required:
        - name
        - value
      properties:
        name:
          type: string
          minLength: 1
        value:
          type: string
        domain:
          type: string
        path:
          type: string
        secure:
          type: boolean
        httpOnly:
          type: boolean
        sameSite:
          type: string
          enum:
            - Strict
            - Lax
            - None
        expires:
          type: number
    CrawlerCrawlInput:
      type: object
      description: Explicit set of URLs to crawl using a saved crawler's config.
      required:
        - urls
      properties:
        urls:
          type: array
          minItems: 1
          maxItems: 500
          items:
            type: string
            format: uri
          description: URLs to crawl.
        callbackUrl:
          type: string
          format: uri
          description: Per-run webhook receiver.
        mode:
          type: string
          enum:
            - sync
            - async
          description: Run mode. Omit to use the API default (async).
        metadata:
          type: object
          additionalProperties: true
          description: Stored on the job.
    CrawlerCreateInput:
      type: object
      description: Fields for creating a crawler profile.
      required:
        - name
      properties:
        key:
          type: string
          minLength: 1
          maxLength: 120
          pattern: ^[a-z0-9][a-z0-9_-]*$
          description: URL-friendly id, unique per tenant/project. Derived from name if omitted.
        name:
          type: string
          minLength: 1
          maxLength: 200
          description: Display name.
        description:
          type: string
          maxLength: 2000
        seeds:
          type: array
          maxItems: 500
          items:
            type: string
            format: uri
          description: Initial URL list. URLs can also be managed via /urls.
        engine:
          type: string
          enum:
            - axios
            - playwright
            - auto
          default: auto
          description: Fetch engine; playwright renders JS.
        maxDepth:
          type: integer
          minimum: 0
          maximum: 3
          default: 0
          description: Link-follow depth. 0 = only the given URLs.
        maxPages:
          type: integer
          minimum: 0
          maximum: 5000
          default: 50
          description: Page cap. 0 = unlimited.
        autoCrawl:
          type: boolean
          default: false
          description: Follow discovered links within scope.
        scope:
          $ref: "#/components/schemas/CrawlerScope"
        http:
          $ref: "#/components/schemas/CrawlerHttpOptions"
        downloadableMimes:
          type: array
          items:
            type: string
          description: MIME types treated as downloadable files.
        markdownOptions:
          $ref: "#/components/schemas/CrawlerMarkdownOptions"
        rag:
          $ref: "#/components/schemas/CrawlerRag"
        webhook:
          $ref: "#/components/schemas/CrawlerWebhook"
        schedule:
          $ref: "#/components/schemas/CrawlerSchedule"
        metadata:
          type: object
          additionalProperties: true
          description: Arbitrary key/value bag.
    CrawlerHttpOptions:
      type: object
      description: HTTP fetch options applied to each request.
      properties:
        userAgent:
          type: string
        acceptLanguage:
          type: string
        timeoutMs:
          type: integer
          minimum: 1000
          maximum: 120000
        maxConcurrency:
          type: integer
          minimum: 1
          maximum: 16
        retries:
          type: integer
          minimum: 1
          maximum: 5
        headers:
          type: object
          additionalProperties:
            type: string
          description: Extra request headers.
        cookies:
          type: array
          items:
            $ref: "#/components/schemas/CrawlerCookie"
        basicAuth:
          type: object
          required:
            - username
            - password
          properties:
            username:
              type: string
            password:
              type: string
        bearerToken:
          type: string
        allowPrivateNetwork:
          type: boolean
        allowInsecureTls:
          type: boolean
          description: Skip TLS certificate verification - opt-in escape hatch for sites with a misconfigured cert chain.
    CrawlerJob:
      type: object
      description: A crawl job enqueued from a crawler run or an ad-hoc run.
      properties:
        id:
          type: string
        crawlerKey:
          type: string
          nullable: true
          description: Parent crawler key; null for ad-hoc jobs.
        trigger:
          type: string
          enum:
            - manual
            - api
            - adhoc
            - schedule
          description: How the job was started.
        status:
          type: string
          enum:
            - queued
            - running
            - succeeded
            - partial
            - failed
            - canceled
        pagesDiscovered:
          type: integer
        pagesProcessed:
          type: integer
        filesProcessed:
          type: integer
        errorsCount:
          type: integer
        limitReached:
          type: boolean
        planSnapshot:
          type: object
          additionalProperties: true
          description: Frozen crawl config used for this job.
        errorMessage:
          type: string
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        endedAt:
          type: string
          format: date-time
          nullable: true
        durationMs:
          type: integer
          nullable: true
    CrawlerMarkdownOptions:
      type: object
      description: Options forwarded to the Markdown extractor.
      properties:
        ocr:
          type: object
          required:
            - enabled
          properties:
            enabled:
              type: boolean
            languages:
              type: array
              items:
                type: string
        outputFormat:
          type: string
          enum:
            - markdown
            - text
        cleanup:
          type: boolean
        stripDataImages:
          type: boolean
        mainContentOnly:
          type: boolean
        contentSelector:
          type: string
          maxLength: 200
        removeSelectors:
          type: array
          maxItems: 50
          items:
            type: string
            maxLength: 200
        maxBodyChars:
          type: integer
          minimum: 0
          maximum: 5000000
    CrawlerRag:
      type: object
      description: Knowledge Engine binding - ingest crawled pages into a module.
      required:
        - ragModuleKey
        - enabled
      properties:
        ragModuleKey:
          type: string
          minLength: 1
        enabled:
          type: boolean
    CrawlerResult:
      type: object
      description: A single fetched page or file stored for a crawl job.
      properties:
        id:
          type: string
        jobId:
          type: string
        url:
          type: string
          format: uri
        parentUrl:
          type: string
          format: uri
          nullable: true
        depth:
          type: integer
        type:
          type: string
          enum:
            - html
            - file
            - error
        httpStatus:
          type: integer
          nullable: true
        contentType:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        bodyMarkdown:
          type: string
          nullable: true
          description: Extracted Markdown; present for html results.
        bytes:
          type: integer
          nullable: true
        ragDocumentId:
          type: string
          nullable: true
        ragStatus:
          type: string
          nullable: true
          enum:
            - pending
            - indexed
            - skipped
            - failed
          description: Knowledge Engine ingestion status; present only when the crawler has a binding.
        errorMessage:
          type: string
          nullable: true
          description: Present for error results.
        fetchedAt:
          type: string
          format: date-time
    CrawlerRunAccepted:
      type: object
      description: "Async run acknowledgement: the job was enqueued."
      required:
        - jobId
        - status
      properties:
        jobId:
          type: string
        status:
          type: string
          example: queued
    CrawlerRunOptions:
      type: object
      description: Options for running a saved crawler. All fields optional; defaults to the crawler's saved config and async mode.
      properties:
        urls:
          type: array
          maxItems: 500
          items:
            type: string
            format: uri
          description: URLs to crawl. Overrides the saved container targets for this run.
        seeds:
          type: array
          maxItems: 500
          items:
            type: string
            format: uri
          description: Legacy alias for urls.
        callbackUrl:
          type: string
          format: uri
          description: Per-run webhook receiver.
        mode:
          type: string
          enum:
            - sync
            - async
          description: Run mode. Omit to use the API default (async).
        metadata:
          type: object
          additionalProperties: true
          description: Stored on the job.
    CrawlerRunSyncResult:
      type: object
      description: "Sync run result: the finished job state with its results inlined (up to 100 results)."
      required:
        - jobId
        - status
        - results
      properties:
        jobId:
          type: string
        status:
          type: string
        pagesProcessed:
          type: integer
          nullable: true
        filesProcessed:
          type: integer
          nullable: true
        errorsCount:
          type: integer
          nullable: true
        results:
          type: array
          items:
            $ref: "#/components/schemas/CrawlerResult"
    CrawlerSchedule:
      type: object
      description: Recurring schedule for the crawler. Interval mode needs intervalSeconds; cron mode needs cron.
      required:
        - mode
        - enabled
      properties:
        mode:
          type: string
          enum:
            - interval
            - cron
        enabled:
          type: boolean
        intervalSeconds:
          type: integer
          minimum: 60
          maximum: 86400
        cron:
          type: string
          minLength: 1
          maxLength: 120
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
    CrawlerScope:
      type: object
      description: Scope filters constraining which discovered links are followed.
      properties:
        sameDomainOnly:
          type: boolean
          default: true
          description: Restrict crawling to the seed's domain.
        includeSubdomains:
          type: boolean
          default: false
          description: Allow subdomains of the seed's domain.
        allowList:
          type: array
          items:
            type: string
          description: Host globs to allow.
        blockList:
          type: array
          items:
            type: string
          description: Host globs to block.
    CrawlerUpdateInput:
      type: object
      description: Partial update of a crawler. Set rag, webhook, or schedule to null to clear them.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 2000
        status:
          type: string
          enum:
            - active
            - disabled
        seeds:
          type: array
          maxItems: 500
          items:
            type: string
            format: uri
        engine:
          type: string
          enum:
            - axios
            - playwright
            - auto
        maxDepth:
          type: integer
          minimum: 0
          maximum: 3
        maxPages:
          type: integer
          minimum: 0
          maximum: 5000
        autoCrawl:
          type: boolean
        scope:
          $ref: "#/components/schemas/CrawlerScope"
        http:
          $ref: "#/components/schemas/CrawlerHttpOptions"
        downloadableMimes:
          type: array
          items:
            type: string
        markdownOptions:
          $ref: "#/components/schemas/CrawlerMarkdownOptions"
        rag:
          nullable: true
          description: Knowledge Engine binding, or null to clear.
          allOf:
            - $ref: "#/components/schemas/CrawlerRag"
        webhook:
          nullable: true
          description: Webhook receiver, or null to clear.
          allOf:
            - $ref: "#/components/schemas/CrawlerWebhook"
        schedule:
          nullable: true
          description: Schedule, or null to clear.
          allOf:
            - $ref: "#/components/schemas/CrawlerSchedule"
        metadata:
          type: object
          additionalProperties: true
    CrawlerUrlsBody:
      type: object
      description: URL list to add to or remove from a crawler.
      required:
        - urls
      properties:
        urls:
          type: array
          minItems: 1
          maxItems: 500
          items:
            type: string
            format: uri
          description: 1-500 URLs to add or remove.
    CrawlerWebhook:
      type: object
      description: Webhook receiver for crawl lifecycle events.
      required:
        - url
        - events
      properties:
        url:
          type: string
          format: uri
        secret:
          type: string
        events:
          type: array
          minItems: 1
          items:
            type: string
            enum:
              - page
              - completed
              - failed
    EmbedEmbedding:
      type: object
      properties:
        object:
          type: string
          example: embedding
          description: The object type, always `embedding`.
        index:
          type: integer
          description: Index of this embedding in the input list.
        embedding:
          type: array
          description: The embedding vector.
          items:
            type: number
    EmbedEmbeddingRequest:
      type: object
      required:
        - model
        - input
      properties:
        model:
          type: string
          description: Embedding model key configured in the dashboard.
          example: text-embedding-3-small
        input:
          description: Text to embed. A single string or an array of strings for batch embedding.
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        encoding_format:
          type: string
          enum:
            - float
            - base64
          default: float
          description: The format in which the embeddings are returned.
        user:
          type: string
          description: Opaque end-user identifier for abuse monitoring.
        request_id:
          type: string
          description: Optional client-provided correlation identifier echoed back on the response.
    EmbedEmbeddingResponse:
      type: object
      properties:
        object:
          type: string
          example: list
          description: The object type, always `list`.
        data:
          type: array
          description: List of embedding objects, one per input, indexed by position.
          items:
            $ref: "#/components/schemas/EmbedEmbedding"
        model:
          type: string
          description: The embedding model key used.
        usage:
          $ref: "#/components/schemas/EmbedUsage"
        request_id:
          type: string
          description: Correlation identifier for the request.
    EmbedUsage:
      type: object
      properties:
        prompt_tokens:
          type: integer
          description: Number of tokens in the input.
        total_tokens:
          type: integer
          description: Total number of tokens used.
    Error:
      type: object
      properties:
        error:
          description: Error detail — a human-readable string, or an object with a message and type.
          oneOf:
            - type: string
            - type: object
              properties:
                message:
                  type: string
                type:
                  type: string
                code:
                  type: string
                  nullable: true
    EvalItemScore:
      type: object
      description: One scorer's result for a single item.
      properties:
        scorer_type:
          type: string
          description: The scorer that produced this score.
          enum:
            - assertion
            - llm-judge
        score:
          type: number
          description: Score in the range 0-1.
        passed:
          type: boolean
          description: Whether this scorer's threshold was met.
        weight:
          type: number
          description: Weight applied to this scorer.
          nullable: true
        error:
          type: string
          description: Error message if this scorer failed to run.
          nullable: true
    EvalRun:
      type: object
      description: A full evaluation run, including its per-item scores.
      allOf:
        - $ref: "#/components/schemas/EvalRunSummary"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/EvalRunItem"
    EvalRunAggregate:
      type: object
      description: Aggregate result across all items of a run.
      nullable: true
      properties:
        total:
          type: integer
          description: Total items in the run.
        completed:
          type: integer
          description: Items that produced a result.
        failed:
          type: integer
          description: Items that errored (target/judge failure).
        passed:
          type: integer
          description: Items where every scorer passed.
        pass_rate:
          type: number
          description: passed / total.
        avg_score:
          type: number
          description: Mean per-item score.
        avg_latency_ms:
          type: number
          description: Mean per-item target latency in milliseconds.
    EvalRunItem:
      type: object
      description: The scored result for one dataset item.
      properties:
        item_id:
          type: string
          description: Identifier of the dataset item.
        passed:
          type: boolean
          description: True when every scorer passed.
        score:
          type: number
          description: Weighted mean of the item's scorer scores.
        latency_ms:
          type: number
          description: Target latency for this item in milliseconds.
          nullable: true
        output_text:
          type: string
          description: Text output produced by the target for this item.
          nullable: true
        error:
          type: string
          description: Error recorded for this item, if the target/judge failed.
          nullable: true
        scores:
          type: array
          items:
            $ref: "#/components/schemas/EvalItemScore"
    EvalRunSummary:
      type: object
      description: An evaluation run without its per-item breakdown.
      properties:
        id:
          type: string
          description: Run identifier.
        suite_key:
          type: string
          description: Key of the suite that was run.
        target_key:
          type: string
          description: Key of the target under test.
        dataset_key:
          type: string
          description: Key of the dataset used.
        status:
          type: string
          description: Run lifecycle status.
          enum:
            - pending
            - running
            - completed
            - failed
        aggregate:
          $ref: "#/components/schemas/EvalRunAggregate"
        error:
          type: string
          description: Run-level error message, if the run failed.
          nullable: true
        started_at:
          type: string
          format: date-time
          description: When execution started.
          nullable: true
        finished_at:
          type: string
          format: date-time
          description: When execution finished.
          nullable: true
        created_at:
          type: string
          format: date-time
          description: When the run record was created.
          nullable: true
    EvalScorer:
      type: object
      description: A scorer bound to a suite. `assertion` runs deterministic checks against the item's `expected`; `llm-judge` grades the output against a rubric (0-1).
      properties:
        type:
          type: string
          description: Scorer kind.
          enum:
            - assertion
            - llm-judge
        weight:
          type: number
          description: Relative weight of this scorer in the item's weighted-mean score.
          nullable: true
        rubric:
          type: string
          description: Grading rubric used by the llm-judge scorer.
          nullable: true
        threshold:
          type: number
          description: Minimum score for this scorer to be considered passed.
          nullable: true
    EvalSuite:
      type: object
      description: "An evaluation suite: a target + dataset + scorers configuration."
      properties:
        key:
          type: string
          description: Stable suite key.
        name:
          type: string
          description: Display name.
        description:
          type: string
          description: Optional suite description.
          nullable: true
        target_key:
          type: string
          description: Key of the target (model/agent/external) under test.
        dataset_key:
          type: string
          description: Key of the dataset of test cases.
        judge_model_key:
          type: string
          description: Model used for llm-judge scoring, when a judge scorer is present.
          nullable: true
        scorers:
          type: array
          items:
            $ref: "#/components/schemas/EvalScorer"
        created_at:
          type: string
          format: date-time
          description: When the suite was created.
          nullable: true
    FileBucket:
      type: object
      description: A file storage bucket.
      properties:
        _id:
          type: string
        key:
          type: string
        name:
          type: string
        description:
          type: string
        provider:
          type: string
        status:
          type: string
        metadata:
          type: object
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    FileCreateProviderRequest:
      type: object
      description: Payload to create a file storage provider.
      required:
        - key
        - driver
        - label
        - credentials
      properties:
        key:
          type: string
          description: Unique provider key.
          example: s3-prod
        driver:
          type: string
          description: Driver identifier.
          example: s3
        label:
          type: string
          description: Human-readable label.
          example: Production Storage
        description:
          type: string
        credentials:
          type: object
          description: Driver-specific credentials.
        settings:
          type: object
          description: Driver-specific settings.
        capabilitiesOverride:
          type: array
          description: Optional override of provider capability flags.
          items:
            type: string
        metadata:
          type: object
        status:
          type: string
          enum:
            - active
            - inactive
          default: active
    FileObject:
      type: object
      description: A file object stored in a bucket.
      properties:
        _id:
          type: string
        key:
          type: string
          example: report-pdf
        bucketKey:
          type: string
        fileName:
          type: string
          example: report.pdf
        originalName:
          type: string
          example: report.pdf
        contentType:
          type: string
          example: application/pdf
        size:
          type: integer
          example: 12345
        sizeBytes:
          type: integer
          example: 12345
        metadata:
          type: object
        markdownContent:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    FileProvider:
      type: object
      description: A configured file storage provider.
      properties:
        _id:
          type: string
        key:
          type: string
          example: s3-prod
        driver:
          type: string
          example: s3
        label:
          type: string
          example: Production Storage
        description:
          type: string
        status:
          type: string
          enum:
            - active
            - inactive
            - error
          example: active
        credentials:
          type: object
          description: Provider-specific credentials (returned redacted/encrypted).
        settings:
          type: object
        metadata:
          type: object
        capabilities:
          type: object
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    FileUploadRequest:
      type: object
      description: Multipart form payload to upload a file.
      required:
        - file
      properties:
        file:
          type: string
          format: binary
          description: The binary file content to upload.
        fileName:
          type: string
          description: Name to store the file under.
          example: report.pdf
        contentType:
          type: string
          description: MIME type of the file.
          example: application/pdf
        convertToMarkdown:
          type: boolean
          default: false
          description: Convert supported documents to Markdown for the Knowledge Engine pipeline.
        keyHint:
          type: string
          description: Optional custom key hint for the stored object.
        metadata:
          type: object
          description: Arbitrary metadata to attach to the file.
    GuardCreateInput:
      type: object
      required:
        - name
        - type
      description: Create a guardrail definition.
      properties:
        name:
          type: string
          description: Guardrail name.
        type:
          type: string
          enum:
            - preset
            - custom
          description: Guardrail type.
        action:
          type: string
          enum:
            - block
            - warn
            - flag
          description: Action on violation. Defaults to `block`.
        customPrompt:
          type: string
          description: LLM rule text. Required for `custom` guardrails.
        description:
          type: string
        enabled:
          type: boolean
          description: Whether the guardrail is active. Defaults to true.
        failMode:
          type: string
          enum:
            - open
            - closed
          description: Behaviour when the check errors.
        modelKey:
          type: string
          description: Model used to evaluate the rule. Required for `custom` guardrails and for LLM-backed policy checks.
        policy:
          type: object
          additionalProperties: true
          description: Preset policy config (moderation, promptShield, wordFilter, etc.).
    GuardEvaluateRequest:
      type: object
      required:
        - guardrail_key
        - text
      properties:
        guardrail_key:
          type: string
          description: Key of the guardrail to evaluate.
          example: pii-checker
        text:
          type: string
          description: Content to evaluate.
          example: My email is john@example.com and my phone is 555-0100
    GuardEvaluateResponse:
      type: object
      properties:
        passed:
          type: boolean
          description: "`true` if no findings triggered, `false` otherwise."
        guardrail_key:
          type: string
          description: Key of the evaluated guardrail.
        guardrail_name:
          type: string
          description: Display name of the guardrail.
        action:
          type: string
          description: Configured action.
          enum:
            - block
            - flag
            - redact
        findings:
          type: array
          description: Array of detected issues.
          items:
            $ref: "#/components/schemas/GuardFinding"
        message:
          type: string
          nullable: true
          description: Optional message for blocked/flagged content; `null` when the content passed.
        disabled:
          type: boolean
          description: Whether the guardrail is disabled (evaluation skipped).
        redacted_text:
          type: string
          nullable: true
          description: Redacted text when the action redacts; `null` otherwise.
    GuardFinding:
      type: object
      description: A single issue detected by the guardrail.
      properties:
        category:
          type: string
          description: Category of the detected issue.
          example: email
        message:
          type: string
          description: Human-readable description of the finding.
          example: Email address detected
        block:
          type: boolean
          description: Whether this finding blocks the content.
    GuardRecord:
      type: object
      additionalProperties: true
      description: A stored guardrail definition.
      properties:
        id:
          type: string
        key:
          type: string
          example: no-pii
        name:
          type: string
        description:
          type: string
        type:
          type: string
          enum:
            - preset
            - custom
        action:
          type: string
          enum:
            - block
            - warn
            - flag
        enabled:
          type: boolean
        failMode:
          type: string
          enum:
            - open
            - closed
        modelKey:
          type: string
        policy:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    GuardUpdateInput:
      type: object
      description: Partial update of a guardrail definition.
      properties:
        name:
          type: string
        action:
          type: string
          enum:
            - block
            - warn
            - flag
        customPrompt:
          type: string
        description:
          type: string
        enabled:
          type: boolean
        failMode:
          type: string
          enum:
            - open
            - closed
        modelKey:
          type: string
        policy:
          type: object
          additionalProperties: true
    McpAegisInput:
      type: object
      description: Aegis enforcement configuration.
      properties:
        shieldId:
          type: string
          description: Aegis shield id to apply.
        mode:
          type: string
          enum:
            - off
            - monitor
            - enforce
          description: Aegis enforcement mode. Defaults to `off`.
    McpConsoleExecuteRequest:
      type: object
      required:
        - tool
      properties:
        tool:
          type: string
          description: Name of the built-in tool to execute.
        arguments:
          type: object
          additionalProperties: true
          description: "Tool arguments (default: empty object)."
    McpConsoleExecuteResponse:
      type: object
      properties:
        result:
          description: The tool's raw result (any JSON value).
        metadata:
          type: object
          properties:
            tool:
              type: string
              description: Executed tool name.
            server:
              type: string
              description: Server key.
              example: console
            latencyMs:
              type: integer
              description: Execution latency in milliseconds.
    McpConsoleListResponse:
      type: object
      properties:
        server:
          type: object
          description: Built-in console MCP server descriptor.
          properties:
            key:
              type: string
              example: console
            name:
              type: string
              example: cognipeer-console
            version:
              type: string
              example: 1.0.0
            builtin:
              type: boolean
              example: true
        tools:
          type: array
          items:
            $ref: "#/components/schemas/McpToolDescriptor"
    McpCreateInput:
      type: object
      required:
        - name
        - upstreamAuth
      description: Create an MCP server definition. `openApiSpec`/`remoteConfig`/`stdioConfig` are required per the chosen `sourceType`.
      properties:
        name:
          type: string
          description: MCP server name.
          example: Tavily Search
        description:
          type: string
        sourceType:
          type: string
          enum:
            - openapi
            - remote
            - stdio
          description: Where the server's tools come from. Defaults to `openapi`.
        openApiSpec:
          type: string
          description: OpenAPI/Postman spec text. Required when `sourceType` is `openapi`.
        specFormat:
          type: string
          enum:
            - auto
            - openapi
            - postman
          description: Hint for parsing `openApiSpec`.
        upstreamBaseUrl:
          type: string
        upstreamAuth:
          $ref: "#/components/schemas/McpUpstreamAuthInput"
        remoteConfig:
          $ref: "#/components/schemas/McpRemoteConfigInput"
        stdioConfig:
          $ref: "#/components/schemas/McpStdioConfigInput"
        exposure:
          $ref: "#/components/schemas/McpExposureInput"
        aegis:
          $ref: "#/components/schemas/McpAegisInput"
    McpExecuteRequest:
      type: object
      required:
        - tool
      properties:
        tool:
          type: string
          description: Name of the tool to execute.
          example: search
        arguments:
          type: object
          additionalProperties: true
          description: "Tool arguments (default: empty object)."
          example:
            query: latest AI news
        runtime_context:
          type: object
          additionalProperties: true
          nullable: true
          description: Optional caller-supplied runtime context. Header values it carries are forwarded upstream only when allowed by the server's runtime-header policy.
    McpExecuteResponse:
      type: object
      properties:
        result:
          description: The tool's raw result (any JSON value).
        metadata:
          type: object
          properties:
            tool:
              type: string
              description: Executed tool name.
              example: search
            server:
              type: string
              description: MCP server key.
              example: tavily-search
            latencyMs:
              type: integer
              description: Execution latency in milliseconds.
              example: 1523
    McpExposureInput:
      type: object
      description: Exposed access surface for the gateway.
      properties:
        protocols:
          type: array
          items:
            type: string
            enum:
              - streamable-http
              - sse
          description: Enabled transport protocols. Defaults to both.
        accessMode:
          type: string
          enum:
            - token
            - public
          description: How callers authenticate against the exposed endpoint. Defaults to `token`.
    McpHubCatalogEntry:
      type: object
      description: MCP-Registry-style catalog entry for one hub member server (whitelist-serialized — no upstream auth/env/vault material).
      properties:
        name:
          type: string
          description: Server key — the stable identifier used in connection URLs.
        title:
          type: string
        description:
          type: string
        version:
          type: string
        tools:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              description:
                type: string
              inputSchema:
                type: object
                additionalProperties: true
            required:
              - name
        remotes:
          type: array
          items:
            $ref: "#/components/schemas/McpHubRemoteEndpoint"
        _meta:
          type: object
          additionalProperties: true
      required:
        - name
        - title
        - version
        - tools
        - remotes
    McpHubCatalogMetadata:
      type: object
      properties:
        count:
          type: integer
          description: Number of entries in this page.
        nextCursor:
          type: string
          description: Cursor for the next page (absent on the last page).
      required:
        - count
    McpHubCatalogPage:
      type: object
      description: A page of a hub's server catalog (MCP-Registry envelope).
      properties:
        servers:
          type: array
          items:
            $ref: "#/components/schemas/McpHubCatalogEntry"
        metadata:
          $ref: "#/components/schemas/McpHubCatalogMetadata"
      required:
        - servers
        - metadata
    McpHubDetail:
      type: object
      description: Hub summary plus the first page of its server catalog.
      properties:
        hub:
          $ref: "#/components/schemas/McpHubSummary"
        servers:
          type: array
          items:
            $ref: "#/components/schemas/McpHubCatalogEntry"
        metadata:
          $ref: "#/components/schemas/McpHubCatalogMetadata"
      required:
        - hub
        - servers
        - metadata
    McpHubList:
      type: object
      properties:
        hubs:
          type: array
          items:
            $ref: "#/components/schemas/McpHubSummary"
      required:
        - hubs
    McpHubRemoteEndpoint:
      type: object
      description: A remote transport endpoint for a hub member server.
      properties:
        type:
          type: string
          enum:
            - streamable-http
            - sse
        url:
          type: string
        authentication:
          type: object
          description: "Authentication descriptor. `{ type: 'none' }` or `{ type: 'bearer', description }`."
          properties:
            type:
              type: string
              enum:
                - none
                - bearer
            description:
              type: string
          required:
            - type
      required:
        - type
        - url
        - authentication
    McpHubSummary:
      type: object
      description: Summary of a curated MCP hub (server catalog).
      properties:
        key:
          type: string
        name:
          type: string
        description:
          type: string
        accessMode:
          type: string
          enum:
            - token
            - public
          description: Exposure mode of the hub.
        serverCount:
          type: integer
          description: Number of member servers.
        updatedAt:
          type: string
          format: date-time
      required:
        - key
        - name
        - accessMode
        - serverCount
    McpJsonRpcError:
      type: object
      description: JSON-RPC 2.0 error object.
      properties:
        code:
          type: integer
          description: JSON-RPC error code (e.g. -32700 parse error, -32600 invalid request, -32601 method not found, -32602 invalid params, -32001 server not found, -32002 server disabled, -32003 protocol disabled, -32603 internal error).
        message:
          type: string
          description: Error message.
    McpJsonRpcRequest:
      type: object
      description: JSON-RPC 2.0 request envelope for an MCP method.
      required:
        - jsonrpc
        - method
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC protocol version.
        id:
          description: Request identifier (string or number); omit or null for notifications.
          example: 1
        method:
          type: string
          description: MCP method to invoke.
          enum:
            - initialize
            - notifications/initialized
            - ping
            - tools/list
            - tools/call
          example: tools/call
        params:
          type: object
          additionalProperties: true
          description: Method parameters. For `tools/call`, `name` is the tool name, `arguments` its arguments, and request-scoped extras may ride in `_meta`.
          example:
            name: search
            arguments:
              query: AI news
    McpJsonRpcResponse:
      type: object
      description: JSON-RPC 2.0 response envelope. Contains either `result` or `error`.
      properties:
        jsonrpc:
          type: string
          enum:
            - "2.0"
          description: JSON-RPC protocol version.
        id:
          description: Identifier echoed from the request (string, number, or null).
          example: 1
        result:
          type: object
          additionalProperties: true
          nullable: true
          description: 'Method result on success. For `tools/call` this is `{ content: [{ type: "text", text }], isError }`.'
        error:
          $ref: "#/components/schemas/McpJsonRpcError"
    McpListToolsResponse:
      type: object
      properties:
        server:
          $ref: "#/components/schemas/McpServer"
        tools:
          type: array
          items:
            $ref: "#/components/schemas/McpToolDescriptor"
    McpRemoteConfigInput:
      type: object
      required:
        - url
      description: "Remote MCP source configuration (for `sourceType: remote`)."
      properties:
        url:
          type: string
          description: Remote MCP server URL.
        transport:
          type: string
          enum:
            - streamable-http
            - sse
          description: Transport. Defaults to `streamable-http`.
    McpServer:
      type: object
      description: Serialized MCP server metadata. Secret upstream credentials are masked.
      additionalProperties: true
      properties:
        id:
          type: string
          description: Server identifier.
        key:
          type: string
          description: MCP server key.
          example: tavily-search
        name:
          type: string
          description: Server name.
          example: Tavily Search
        status:
          type: string
          enum:
            - active
            - disabled
          description: Server status.
        totalRequests:
          type: integer
          description: Total requests served.
          example: 42
        sourceType:
          type: string
          description: Underlying source type of the server (e.g. openapi, remote, stdio).
        exposure:
          type: object
          additionalProperties: true
          description: Enabled access surface for the server.
          properties:
            protocols:
              type: array
              description: Enabled transport protocols.
              items:
                type: string
                enum:
                  - streamable-http
                  - sse
        disabledTools:
          type: array
          description: Names of tools disabled on this server.
          items:
            type: string
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp.
    McpStdioConfigInput:
      type: object
      required:
        - packageName
      description: "Stdio (npx/uvx) MCP source configuration (for `sourceType: stdio`)."
      properties:
        runtime:
          type: string
          enum:
            - npx
            - uvx
          description: Package runner. Defaults to `npx`.
        packageName:
          type: string
          description: Package to run.
        args:
          type: array
          items:
            type: string
          description: Extra CLI arguments.
        env:
          type: object
          additionalProperties:
            type: string
          description: Environment variables passed to the process.
        executionMode:
          type: string
          enum:
            - subprocess
            - sandbox
          description: Execution mode. `sandbox` requires an Enterprise license.
        sandbox:
          type: object
          description: Sandbox settings (only used when `executionMode` is `sandbox`).
          properties:
            templateKey:
              type: string
            resources:
              type: object
              properties:
                cpuCores:
                  type: number
                memoryMb:
                  type: number
    McpToolDescriptor:
      type: object
      description: An MCP tool descriptor (name, description and input schema).
      properties:
        name:
          type: string
          description: Tool name.
          example: search
        description:
          type: string
          nullable: true
          description: Tool description.
        inputSchema:
          type: object
          additionalProperties: true
          description: JSON Schema describing the tool's input arguments.
    McpUpdateInput:
      type: object
      additionalProperties: true
      description: Partial update of an MCP server definition.
      properties:
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum:
            - active
            - disabled
        openApiSpec:
          type: string
        specFormat:
          type: string
          enum:
            - auto
            - openapi
            - postman
        upstreamBaseUrl:
          type: string
        upstreamAuth:
          $ref: "#/components/schemas/McpUpstreamAuthInput"
        remoteConfig:
          $ref: "#/components/schemas/McpRemoteConfigInput"
        stdioConfig:
          $ref: "#/components/schemas/McpStdioConfigInput"
        exposure:
          $ref: "#/components/schemas/McpExposureInput"
        aegis:
          $ref: "#/components/schemas/McpAegisInput"
        runtimeHeaders:
          type: object
          nullable: true
          description: Runtime header passthrough policy. `null` clears it.
          properties:
            allow:
              type: boolean
            allowedNames:
              type: array
              items:
                type: string
        disabledTools:
          type: array
          items:
            type: string
          description: Names of tools to disable on this server.
    McpUpstreamAuthInput:
      type: object
      required:
        - type
      description: Upstream auth configuration. Secret fields are encrypted at rest and masked in responses.
      properties:
        type:
          type: string
          enum:
            - none
            - token
            - header
            - basic
          description: Upstream auth scheme.
        token:
          type: string
          description: Bearer token (for `token`).
        headerName:
          type: string
          description: Custom header name (for `header`).
        headerValue:
          type: string
          description: Custom header value (for `header`).
        username:
          type: string
          description: Username (for `basic`).
        password:
          type: string
          description: Password (for `basic`).
    MemoryBatchRequest:
      type: object
      required:
        - memories
      properties:
        memories:
          type: array
          description: Memory items to add. Maximum 100 per batch; each item must include content.
          items:
            $ref: "#/components/schemas/MemoryCreateRequest"
          minItems: 1
          maxItems: 100
    MemoryCreateRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          description: Memory content.
        scope:
          type: string
          enum:
            - user
            - agent
            - session
            - global
          description: Memory scope.
        scopeId:
          type: string
          description: Identifier the memory is scoped to.
        tags:
          type: array
          items:
            type: string
          description: Categorization tags.
        importance:
          type: number
          description: Importance weight (0-1).
        source:
          type: string
          description: Origin of the memory.
        metadata:
          type: object
          additionalProperties: true
          description: Custom metadata.
    MemoryItem:
      type: object
      description: A stored memory item.
      properties:
        id:
          type: string
          description: Unique identifier.
        storeKey:
          type: string
          description: Key of the owning store.
        content:
          type: string
          description: Memory content.
        scope:
          type: string
          enum:
            - user
            - agent
            - session
            - global
          description: Memory scope.
        scopeId:
          type: string
          nullable: true
          description: Identifier the memory is scoped to.
        tags:
          type: array
          items:
            type: string
          description: Categorization tags.
        importance:
          type: number
          description: Importance weight (0-1).
        source:
          type: string
          description: Origin of the memory.
        status:
          type: string
          enum:
            - active
            - archived
            - expired
          description: Memory status.
        metadata:
          type: object
          additionalProperties: true
          description: Custom metadata.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    MemoryMatch:
      type: object
      description: A memory returned by a search or recall operation, including its relevance score.
      properties:
        id:
          type: string
          description: Memory identifier.
        content:
          type: string
          description: Memory content.
        score:
          type: number
          description: Similarity score.
        scope:
          type: string
          enum:
            - user
            - agent
            - session
            - global
          description: Memory scope.
        scopeId:
          type: string
          nullable: true
          description: Identifier the memory is scoped to.
        tags:
          type: array
          items:
            type: string
          description: Categorization tags.
        metadata:
          type: object
          additionalProperties: true
          description: Custom metadata.
        importance:
          type: number
          description: Importance weight (0-1).
    MemoryRecallRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          description: Recall query text.
        topK:
          type: integer
          default: 5
          description: Maximum number of memories to recall.
        scope:
          type: string
          enum:
            - user
            - agent
            - session
            - global
          description: Filter by scope.
        scopeId:
          type: string
          description: Filter by scope id.
        maxTokens:
          type: integer
          default: 2000
          description: Maximum tokens for the assembled context string.
    MemoryRecallResult:
      type: object
      description: Result of a recall-for-chat operation.
      properties:
        context:
          type: string
          description: Formatted context string assembled from the recalled memories.
        memories:
          type: array
          items:
            $ref: "#/components/schemas/MemoryMatch"
        storeKey:
          type: string
          description: Key of the recalled store.
    MemorySearchRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          description: Search query text.
        topK:
          type: integer
          default: 10
          description: Maximum number of results.
        minScore:
          type: number
          description: Minimum similarity score.
        scope:
          type: string
          enum:
            - user
            - agent
            - session
            - global
          description: Filter by scope.
        scopeId:
          type: string
          description: Filter by scope id.
        tags:
          type: array
          items:
            type: string
          description: Filter by tags.
    MemorySearchResult:
      type: object
      description: Result of a semantic search.
      properties:
        memories:
          type: array
          items:
            $ref: "#/components/schemas/MemoryMatch"
        query:
          type: string
          description: The query that was executed.
        storeKey:
          type: string
          description: Key of the searched store.
    MemoryStore:
      type: object
