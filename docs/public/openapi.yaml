        environment:
          type: string
          enum:
            - dev
            - staging
            - prod
        versionId:
          type: string
        version:
          type: integer
        rolloutStatus:
          type: string
          enum:
            - planned
            - active
        rolloutStrategy:
          type: string
          enum:
            - manual
        rollbackVersionId:
          type: string
        rollbackVersion:
          type: integer
        note:
          type: string
        updatedBy:
          type: string
        updatedAt:
          type: string
