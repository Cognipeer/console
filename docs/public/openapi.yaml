        content:
          type: string
        metadata:
          type: object
          additionalProperties: true
        documentId:
          type: string
        fileName:
          type: string
        chunkIndex:
          type: integer
    RagQueryResult:
      type: object
      description: Result of a Knowledge Engine semantic query.
      properties:
        matches:
          type: array
          items:
