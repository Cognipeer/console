          type: string
        version:
          type: integer
          example: 3
        name:
          type: string
          example: v3
        description:
          type: string
        comment:
          type: string
        isLatest:
          type: boolean
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
    PromptView:
      type: object
