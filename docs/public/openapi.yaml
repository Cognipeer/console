          type: string
        tenantId:
          type: string
        projectId:
          type: string
        key:
          type: string
          example: welcome-message
        name:
          type: string
          example: Welcome Message
        description:
          type: string
        template:
          type: string
          example: Hello {{name}}!
        metadata:
          type: object
          additionalProperties: true
        currentVersion:
          type: integer
        createdBy:
          type: string
        updatedBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deployments:
          type: object
          description: Current deployment state keyed by environment.
          properties:
            dev:
              $ref: "#/components/schemas/PromptDeploymentState"
            staging:
              $ref: "#/components/schemas/PromptDeploymentState"
            prod:
              $ref: "#/components/schemas/PromptDeploymentState"
        deploymentHistory:
          type: array
          items:
            $ref: "#/components/schemas/PromptDeploymentEvent"
    RagChunkConfig:
      type: object
      description: Chunking configuration for a Knowledge Engine module.
      properties:
        strategy:
          type: string
          enum:
            - recursive_character
            - token
        chunkSize:
          type: integer
        chunkOverlap:
          type: integer
        separators:
          type: array
          items:
            type: string
        encoding:
          type: string
    RagDocument:
      type: object
      description: A document ingested into a Knowledge Engine module.
      properties:
        _id:
          type: string
        tenantId:
          type: string
        projectId:
